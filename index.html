                                        <Icon name={isFetchingMeta ? "Loader" : "RefreshCw"} size={16} className={`mr-2 ${isFetchingMeta ? 'animate-spin text-slate-400' : 'text-slate-400'}`} />
                                        {isFetchingMeta ? "同期中..." : "このクライアントを同期"}
                                    </button>
                                    <button className="bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 rounded-md px-4 py-2 text-sm font-medium shadow-sm transition-colors flex items-center h-[38px] whitespace-nowrap shrink-0">
                                        <Icon name="Download" size={16} className="mr-2 text-slate-400" /> CSV出力
                                    </button>
                                </div>
                            )}
                        </div>
                    </header>

                    {/* タブナビゲーション */}
                    <div className="border-b border-slate-200">
                        <nav className="-mb-px flex space-x-8 overflow-x-auto no-scrollbar" aria-label="Tabs">
                            <button onClick={() => setActiveTab('dashboard')} className={`whitespace-nowrap flex-shrink-0 py-4 px-1 border-b-2 font-medium text-sm transition-colors flex items-center ${activeTab === 'dashboard' ? 'border-primary text-primary' : 'border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300'}`}>
                                <Icon name="LayoutDashboard" size={16} className="mr-2" /> 配信ステータス
                            </button>
                            <button onClick={() => setActiveTab('history')} className={`whitespace-nowrap flex-shrink-0 py-4 px-1 border-b-2 font-medium text-sm transition-colors flex items-center ${activeTab === 'history' ? 'border-primary text-primary' : 'border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300'}`}>
                                <Icon name="History" size={16} className="mr-2" /> 変更履歴・ログ
                            </button>
                            <button onClick={() => setActiveTab('minutes')} className={`whitespace-nowrap flex-shrink-0 py-4 px-1 border-b-2 font-medium text-sm transition-colors flex items-center ${activeTab === 'minutes' ? 'border-primary text-primary' : 'border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300'}`}>
                                <Icon name="BookOpen" size={16} className="mr-2" /> 打ち合わせ議事録
                            </button>
                            {role !== 'client' && (
                                <button onClick={() => setActiveTab('info')} className={`whitespace-nowrap flex-shrink-0 py-4 px-1 border-b-2 font-medium text-sm transition-colors flex items-center ${activeTab === 'info' ? 'border-primary text-primary' : 'border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300'}`}>
                                    <Icon name="Info" size={16} className="mr-2" /> アカウント情報 (URL/詳細)
                                </button>
                            )}
                        </nav>
                    </div>

                    {/* タブコンテンツ: ダッシュボード */}
                    {activeTab === 'dashboard' && (
                        <div className="space-y-6 animate-in fade-in duration-300">
                            <Card className="overflow-hidden shadow-sm border-slate-200">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm text-left whitespace-nowrap">
                                        <thead className="text-xs text-slate-500 bg-slate-50/80 border-b">
                                            <tr>
                                                <th className="px-3 py-3 w-[220px]">名前</th>
                                                <th className="px-3 py-3">ステータス</th>
                                                <th className="px-3 py-3 text-right">消化金額</th>
                                                <th className="px-3 py-3 text-right">結果</th>
                                                <th className="px-3 py-3 text-right">結果の単価</th>
                                                <th className="px-3 py-3 text-right">インプレッション</th>
                                                <th className="px-3 py-3 text-right">CPM</th>
                                                <th className="px-3 py-3 text-right">リンククリック</th>
                                                <th className="px-3 py-3 text-right">フリークエンシー</th>
                                                <th className="px-3 py-3 text-right">CPC</th>
                                                <th className="px-3 py-3 text-right">CTR</th>
                                            </tr>
                                        </thead>
                                        <tbody>{renderRows(data)}</tbody>
                                    </table>
                                </div>
                            </Card>
                        </div>
                    )}

                    {/* タブコンテンツ: History */}
                    {activeTab === 'history' && (
                        <div className="space-y-6 animate-in fade-in duration-300">
                            {role !== 'client' && (
                                <Card className="p-6 border-slate-200 bg-white shadow-sm">
                                <h3 className="text-sm font-bold text-slate-900 mb-5 flex items-center gap-2">
                                    <Icon name="MessageSquarePlus" size={18} className="text-primary" /> 新しい変更履歴・ログを追加
                                </h3>
                                <form onSubmit={handleAddLog} className="space-y-4">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div className="space-y-2">
                                            <label className="text-xs font-semibold text-slate-700 block">担当者</label>
                                            <div className="relative">
                                                <select value={logUser} onChange={e => setLogUser(e.target.value)} className="w-full px-3 py-2.5 border border-slate-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 bg-slate-50 focus:bg-white appearance-none pr-8 cursor-pointer">
                                                    <option value="運用担当者">運用担当者</option>
                                                    <option value="制作部">制作部</option>
                                                    <option value="金谷">金谷</option>
                                                    <option value="クライアント">クライアント</option>
                                                </select>
                                                <Icon name="ChevronDown" size={14} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none" />
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-xs font-semibold text-slate-700 block">大項目（何についての変更か）</label>
                                            <div className="relative">
                                                <select value={logCategory} onChange={e => setLogCategory(e.target.value)} className="w-full px-3 py-2.5 border border-slate-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 bg-slate-50 focus:bg-white appearance-none pr-8 cursor-pointer">
                                                    {Object.keys(HISTORY_MENU).map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                                </select>
                                                <Icon name="ChevronDown" size={14} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none" />
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-xs font-semibold text-slate-700 block">小項目（詳細な分類）</label>
                                            <div className="relative">
                                                <select value={logSubCategory} onChange={e => setLogSubCategory(e.target.value)} className="w-full px-3 py-2.5 border border-slate-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 bg-slate-50 focus:bg-white appearance-none pr-8 cursor-pointer">
                                                    {HISTORY_MENU[logCategory] && HISTORY_MENU[logCategory].map(sub => <option key={sub} value={sub}>{sub}</option>)}
                                                </select>
                                                <Icon name="ChevronDown" size={14} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none" />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-2">
                                            <label className="text-xs font-semibold text-slate-700 block">変更前 (任意)</label>
                                            <input type="text" value={logBefore} onChange={e => setLogBefore(e.target.value)} placeholder="例: 月額50万円 または OFF" className="w-full px-3 py-2.5 border border-slate-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 bg-slate-50 focus:bg-white" />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-xs font-semibold text-slate-700 block">変更後 (任意)</label>
                                            <input type="text" value={logAfter} onChange={e => setLogAfter(e.target.value)} placeholder="例: 月額80万円 または ON" className="w-full px-3 py-2.5 border border-slate-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 bg-slate-50 focus:bg-white" />
                                        </div>
                                    </div>

                                    <div className="flex flex-col md:flex-row gap-3 items-end pt-1">
                                        <div className="flex-1 w-full space-y-2">
                                            <label className="text-xs font-semibold text-slate-700 block">具体的な変更メモ (任意)</label>
                                            <input type="text" value={newLog} onChange={e => setNewLog(e.target.value)} placeholder="例: CVR改善のため予算比率をアップしました。" className="w-full px-4 py-2.5 border border-slate-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-slate-50 focus:bg-white transition-colors" />
                                        </div>
                                        <button type="submit" className="w-full md:w-auto bg-primary hover:bg-primary/90 text-white px-8 py-2.5 rounded-md font-medium text-sm shadow-sm transition-colors whitespace-nowrap flex items-center justify-center gap-2 h-10">
                                            <Icon name="Send" size={16} /> 履歴に残す
                                        </button>
                                    </div>
                                </form>
                                </Card>
                            )}

                            {/* フィルターバー */}
                            <div className="flex flex-wrap gap-3 mb-6 bg-slate-50 p-3 rounded-lg border border-slate-200 shadow-sm relative z-10">
                                <div className="flex items-center gap-2">
                                    <Icon name="Filter" size={14} className="text-slate-500" />
                                    <span className="text-xs font-semibold text-slate-600">絞り込み:</span>
                                </div>
                                <select value={historyFilterDate} onChange={(e) => setHistoryFilterDate(e.target.value)} className="px-3 py-1.5 border border-slate-200 rounded-md text-xs focus:outline-none focus:border-primary bg-white cursor-pointer min-w-[120px]">
                                    <option value="all">すべての期間</option>
                                    <option value="last_7">直近7日間</option>
                                    <option value="this_month">今月</option>
                                </select>
                                <select value={historyFilterMainCat} onChange={(e) => setHistoryFilterMainCat(e.target.value)} className="px-3 py-1.5 border border-slate-200 rounded-md text-xs focus:outline-none focus:border-primary bg-white cursor-pointer min-w-[140px]">
                                    <option value="all">全カテゴリ</option>
                                    {Object.keys(HISTORY_MENU).map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                </select>
                                <select value={historyFilterSubCat} onChange={(e) => setHistoryFilterSubCat(e.target.value)} disabled={historyFilterMainCat === "all"} className="px-3 py-1.5 border border-slate-200 rounded-md text-xs focus:outline-none focus:border-primary bg-white cursor-pointer disabled:opacity-50 min-w-[140px]">
                                    <option value="all">全サブカテゴリ</option>
                                    {historyFilterMainCat !== "all" && HISTORY_MENU[historyFilterMainCat] && HISTORY_MENU[historyFilterMainCat].map(sub => <option key={sub} value={sub}>{sub}</option>)}
                                </select>
                            </div>

                            <div className="space-y-4">
                                {(() => {
                                    // 1. フィルタリングロジック
                                    const currentHistory = supabase ? dbHistoryLogs : historyLogs;
                                    const filtered = currentHistory.filter(log => {
                                        const [mainCat, subCat] = log.action.split(": ");
                                        if (historyFilterMainCat !== "all" && mainCat !== historyFilterMainCat) return false;
                                        if (historyFilterSubCat !== "all" && subCat !== historyFilterSubCat) return false;
                                        return true;
                                    });

                                    if (filtered.length === 0) {
                                        return (
                                            <div className="py-12 flex flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-xl bg-slate-50">
                                                <Icon name="SearchX" size={32} className="text-slate-300 mb-3" />
                                                <p className="text-slate-500 text-sm">該当する変更履歴はありません。</p>
                                            </div>
                                        );
                                    }

                                    // 2. 日付ごとにグルーピング
                                    const grouped = filtered.reduce((acc, log) => {
                                        const [dPart, tPart] = log.date.split(" ");
                                        if (!acc[dPart]) acc[dPart] = [];
                                        acc[dPart].push({ ...log, time: tPart });
                                        return acc;
                                    }, {});

                                    const sortedDates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

                                    return (
                                        <div className="relative ml-8">
                                            {/* ベースの縦ライン */}
                                            <div className="absolute left-0 top-6 bottom-4 w-px bg-slate-200"></div>

                                            <div className="space-y-10 relative">
                                                {sortedDates.map(date => {
                                                    const [y, m, d] = date.split("-");
                                                    const formattedDate = `${y}年${parseInt(m)}月${parseInt(d)}日`;

                                                    return (
                                                        <div key={date} className="relative">
                                                            {/* 日付ヘッダー */}
                                                            <div className="flex items-center gap-4 relative z-10 -ml-[15px]">
                                                                <div className="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center border border-slate-200 shadow-sm text-slate-500">
                                                                    <Icon name="Calendar" size={14} />
                                                                </div>
                                                                <h4 className="font-bold text-slate-800 tracking-tight">{formattedDate}</h4>
                                                            </div>

                                                            {/* タイムラインの子ノード */}
                                                            <div className="space-y-6 mt-6 ml-[15px] pl-8">
                                                                {grouped[date].map(log => {
                                                                    const [mainCat, subCat] = log.action.split(": ");
                                                                    return (
                                                                        <div key={log.id} className="relative border border-slate-100 bg-white rounded-lg p-5 shadow-[0_2px_8px_-4px_rgba(0,0,0,0.1)] hover:shadow-md transition-shadow">
                                                                            {/* ノードドット */}
                                                                            <div className="absolute -left-[37px] top-6 w-[9px] h-[9px] rounded-full bg-primary/80 ring-4 ring-white shadow-sm" />

                                                                            {editHistoryId === log.id ? (
                                                                                <div className="space-y-3 mt-4">
                                                                                    <textarea autoFocus value={editHistoryForm.detail} onChange={e => setEditHistoryForm({ ...editHistoryForm, detail: e.target.value })} className="w-full p-2 text-sm border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/20 bg-slate-50 focus:bg-white resize-y min-h-[60px]" placeholder="具体的な変更メモ (任意)" />
                                                                                    <div className="flex gap-2 text-sm">
                                                                                        <input type="text" value={editHistoryForm.before} onChange={e => setEditHistoryForm({ ...editHistoryForm, before: e.target.value })} className="flex-1 p-2 border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/20 bg-slate-50 focus:bg-white" placeholder="変更前 (任意)" />
                                                                                        <input type="text" value={editHistoryForm.after} onChange={e => setEditHistoryForm({ ...editHistoryForm, after: e.target.value })} className="flex-1 p-2 border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/20 bg-slate-50 focus:bg-white" placeholder="変更後 (任意)" />
                                                                                    </div>
                                                                                    <div className="flex justify-end gap-2 pt-2">
                                                                                        <button onClick={() => setEditHistoryId(null)} className="px-3 py-1.5 text-xs font-medium text-slate-600 hover:bg-slate-200 bg-slate-100 rounded-md transition-colors">キャンセル</button>
                                                                                        <button onClick={handleSaveHistory} className="px-4 py-1.5 text-xs font-medium text-white bg-primary hover:bg-primary/90 rounded-md flex items-center gap-1.5 shadow-sm transition-colors"><Icon name="Save" size={14} /> 保存</button>
                                                                                    </div>
                                                                                </div>
                                                                            ) : (
                                                                                <>
                                                                                    {role !== 'client' && (
                                                                                        <div className="absolute right-3 top-3 opacity-80 hover:opacity-100 transition-opacity flex gap-2 z-10">
                                                                                            <button onClick={() => { setEditHistoryId(log.id); setEditHistoryForm({ ...log }); }} className="px-3 py-1 text-[11px] font-bold text-indigo-600 hover:text-indigo-700 bg-indigo-50 hover:bg-indigo-100 border border-indigo-200/60 shadow-sm rounded-md flex items-center gap-1 transition-all"><Icon name="Edit3" size={12} /> 編集</button>
                                                                                            <button onClick={() => handleDeleteHistory(log.id)} className="px-3 py-1 text-[11px] font-bold text-rose-600 hover:text-rose-700 bg-rose-50 hover:bg-rose-100 border border-rose-200/60 shadow-sm rounded-md flex items-center gap-1 transition-all"><Icon name="Trash2" size={12} /> 削除</button>
                                                                                        </div>
                                                                                    )}
                                                                                    <div className="flex flex-col sm:flex-row sm:items-center gap-3 mb-3 pr-32">
                                                                                        <div className="flex items-center gap-3">
                                                                                            <span className="font-semibold text-slate-900 text-sm flex items-center gap-1.5 bg-slate-100/80 px-2.5 py-1 rounded-md shadow-sm border border-slate-200/50">
                                                                                                <div className="w-5 h-5 rounded-full bg-primary/10 text-primary flex items-center justify-center text-[10px]"><Icon name="User" size={10} /></div>
                                                                                                {log.user}
                                                                                            </span>
                                                                                        </div>

                                                                                        <div className="flex items-center gap-2 flex-wrap">
                                                                                            {mainCat && (
                                                                                                <button
                                                                                                    onClick={() => { setHistoryFilterMainCat(mainCat); setHistoryFilterSubCat("all"); }}
                                                                                                    className="font-medium text-[11px] bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-full px-2.5 py-0.5 whitespace-nowrap shadow-sm transition-colors border border-indigo-100/50"
                                                                                                >
                                                                                                    {mainCat}
                                                                                                </button>
                                                                                            )}
                                                                                            {subCat && (
                                                                                                <>
                                                                                                    <Icon name="ChevronRight" size={12} className="text-slate-300" />
                                                                                                    <button
                                                                                                        onClick={() => { setHistoryFilterMainCat(mainCat); setHistoryFilterSubCat(subCat); }}
                                                                                                        className="font-medium text-[11px] bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full border border-slate-200 px-2.5 py-0.5 whitespace-nowrap shadow-sm transition-colors"
                                                                                                    >
                                                                                                        {subCat}
                                                                                                    </button>
                                                                                                </>
                                                                                            )}
                                                                                        </div>
                                                                                    </div>

                                                                                    {(log.before || log.after || log.detail) && (
                                                                                        <div className="mt-4 text-sm text-slate-800 leading-relaxed bg-slate-50/70 rounded-md border border-slate-100/80 overflow-hidden">
                                                                                            {(log.before || log.after) && (
                                                                                                <div className="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 p-3 border-b border-slate-100/80 bg-white/50">
                                                                                                    <div className="flex items-center gap-2 flex-1">
                                                                                                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider bg-slate-100 px-1.5 py-0.5 rounded border border-slate-200/50">変更前</span>
                                                                                                        <span className="font-medium text-slate-600 line-through decoration-slate-400">{log.before || "-"}</span>
                                                                                                    </div>
                                                                                                    <Icon name="ArrowRight" size={14} className="text-slate-300 hidden sm:block shrink-0" />
                                                                                                    <div className="flex items-center gap-2 flex-1">
                                                                                                        <span className="text-[10px] font-bold text-emerald-600 uppercase tracking-wider bg-emerald-50 px-1.5 py-0.5 rounded border border-emerald-100/50">変更後</span>
                                                                                                        <span className="font-bold text-emerald-700">{log.after || "-"}</span>
                                                                                                    </div>
                                                                                                </div>
                                                                                            )}
                                                                                            {log.detail && <div className="p-3.5"><p>{log.detail}</p></div>}
                                                                                        </div>
                                                                                    )}
                                                                                </>
                                                                            )}
                                                                        </div>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    );
                                })()}
                            </div>
                        </div>
                    )}

                    {/* タブコンテンツ: 議事録 (Minutes) */}
                    {activeTab === 'minutes' && (
                        <div className="space-y-6 animate-in fade-in duration-300">
                            {role !== 'client' && (
                                <Card className="p-6 border-slate-200 bg-white shadow-sm">
                                <h3 className="text-sm font-bold text-slate-900 mb-5 flex items-center gap-2">
                                    <Icon name="FileEdit" size={18} className="text-primary" /> 新しい議事録を追加
                                </h3>
                                <form onSubmit={handleAddMinute} className="space-y-4">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-2">
                                            <label className="text-xs font-semibold text-slate-700 block">打ち合わせ日 <span className="text-red-500">*</span></label>
                                            <input
                                                type="date" required value={newMinuteDate} onChange={e => setNewMinuteDate(e.target.value)}
                                                className="w-full px-4 py-2 border border-slate-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 bg-slate-50 focus:bg-white"
                                            />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-xs font-semibold text-slate-700 block">タイトル（会議のテーマ） <span className="text-red-500">*</span></label>
                                            <input
                                                type="text" required value={newMinuteTitle} onChange={e => setNewMinuteTitle(e.target.value)}
                                                placeholder="例: 4月度定例ミーティング"
                                                className="w-full px-4 py-2 border border-slate-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 bg-slate-50 focus:bg-white"
                                            />
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-xs font-semibold text-slate-700 block">詳細議事録のURL（任意）</label>
                                        <div className="relative">
                                            <Icon name="Link" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                            <input
                                                type="url" value={newMinuteUrl} onChange={e => setNewMinuteUrl(e.target.value)}
                                                placeholder="例: https://notion.so/..."
                                                className="w-full pl-9 pr-4 py-2 border border-slate-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 bg-slate-50 focus:bg-white transition-colors"
                                            />
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-xs font-semibold text-slate-700 block">要約・決定事項（必須） <span className="text-red-500">*</span></label>
                                        <textarea
                                            required rows="4" value={newMinuteText} onChange={e => setNewMinuteText(e.target.value)}
                                            placeholder="会議の要点や、決定したNext Actionを簡潔に入力してください..."
                                            className="w-full px-4 py-2 border border-slate-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 bg-slate-50 focus:bg-white resize-y"
                                        />
                                    </div>
                                    <div className="text-right pt-2">
                                        <button type="submit" className="bg-primary hover:bg-primary/90 text-white px-8 py-2.5 rounded-md font-medium text-sm flex items-center justify-center gap-2 ml-auto w-full md:w-auto shadow-sm transition-colors">
                                            <Icon name="Save" size={16} /> 議事録を保存する
                                        </button>
                                    </div>
                                </form>
                                </Card>
                            )}

                            <div className="relative pl-4 border-l-2 border-slate-200/60 ml-4 pb-8 space-y-12 mt-8">
                                {(() => {
                                    const currentMinutes = supabase ? dbMinutesLogs : minutesLogs;
                                    const grouped = currentMinutes.reduce((acc, log) => {
                                        if (!acc[log.date]) acc[log.date] = [];
                                        acc[log.date].push(log);
                                        return acc;
                                    }, {});
                                    const sortedDates = Object.keys(grouped).sort((a, b) => new Date(b) - new Date(a));

                                    return sortedDates.map(date => {
                                        const [y, m, d] = date.split('-');
                                        const formattedDate = `${y}年${parseInt(m)}月${parseInt(d)}日`;

                                        return (
                                            <div key={date} className="relative">
                                                <div className="flex items-center gap-4 relative z-10 -ml-[15px]">
                                                    <div className="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center border border-slate-200 shadow-sm text-slate-500">
                                                        <Icon name="Calendar" size={14} />
                                                    </div>
                                                    <h4 className="font-bold text-slate-800 tracking-tight">{formattedDate}</h4>
                                                </div>

                                                <div className="space-y-6 mt-6 ml-[15px] pl-8">
                                                    {grouped[date].map(log => (
                                                        <div key={log.id} className="relative border border-slate-100 bg-white rounded-lg p-5 shadow-[0_2px_8px_-4px_rgba(0,0,0,0.1)] hover:shadow-md transition-shadow group">
                                                            <div className="absolute -left-[37px] top-6 w-[9px] h-[9px] rounded-full bg-primary/80 ring-4 ring-white shadow-sm" />
                                                            {editMinuteId === log.id ? (
                                                                <div className="space-y-4">
                                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                                        <div>
                                                                            <label className="text-xs font-semibold text-slate-500 mb-1 block">打ち合わせ日</label>
                                                                            <input type="date" value={editMinuteForm.date} onChange={e => setEditMinuteForm({ ...editMinuteForm, date: e.target.value })} className="w-full px-3 py-2 border rounded-md text-sm outline-none focus:border-primary" />
                                                                        </div>
                                                                        <div>
                                                                            <label className="text-xs font-semibold text-slate-500 mb-1 block">タイトル</label>
                                                                            <input type="text" value={editMinuteForm.title} onChange={e => setEditMinuteForm({ ...editMinuteForm, title: e.target.value })} className="w-full px-3 py-2 border rounded-md text-sm outline-none focus:border-primary" />
                                                                        </div>
                                                                    </div>
                                                                    <div>
                                                                        <label className="text-xs font-semibold text-slate-500 mb-1 block">詳細議事録URL</label>
                                                                        <input type="url" value={editMinuteForm.url} onChange={e => setEditMinuteForm({ ...editMinuteForm, url: e.target.value })} className="w-full px-3 py-2 border rounded-md text-sm outline-none focus:border-primary" placeholder="任意" />
                                                                    </div>
                                                                    <div>
                                                                        <label className="text-xs font-semibold text-slate-500 mb-1 block">要約・決定事項</label>
                                                                        <textarea value={editMinuteForm.detail} onChange={e => setEditMinuteForm({ ...editMinuteForm, detail: e.target.value })} className="w-full px-3 py-2 border rounded-md text-sm outline-none focus:border-primary min-h-[100px]" />
                                                                    </div>
                                                                    <div className="flex justify-end gap-2 pt-2">
                                                                        <button onClick={() => setEditMinuteId(null)} className="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-200 bg-slate-100 rounded-md transition-colors">キャンセル</button>
                                                                        <button onClick={handleSaveMinute} className="px-4 py-2 text-sm font-medium text-white bg-primary hover:bg-primary/90 rounded-md flex items-center gap-2 transition-colors"><Icon name="Save" size={16} /> 保存</button>
                                                                    </div>
                                                                </div>
                                                            ) : (
                                                                <>
                                                                    {role !== 'client' && (
                                                                        <div className="absolute right-3 top-3 opacity-80 hover:opacity-100 transition-opacity flex gap-2 z-10">
                                                                            <button onClick={() => { setEditMinuteId(log.id); setEditMinuteForm({ ...log }); }} className="px-3 py-1.5 text-[11px] font-bold text-indigo-600 hover:text-indigo-700 bg-indigo-50 hover:bg-indigo-100 border border-indigo-200/60 shadow-sm rounded-md flex items-center gap-1.5 transition-all"><Icon name="Edit3" size={14} /> 編集</button>
                                                                            <button onClick={() => handleDeleteMinute(log.id)} className="px-3 py-1.5 text-[11px] font-bold text-rose-600 hover:text-rose-700 bg-rose-50 hover:bg-rose-100 border border-rose-200/60 shadow-sm rounded-md flex items-center gap-1.5 transition-all"><Icon name="Trash2" size={14} /> 削除</button>
                                                                        </div>
                                                                    )}
                                                                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4 border-b border-slate-100 pb-4 pr-32">
                                                                        <h4 className="text-lg font-bold text-slate-900 flex items-center gap-2 max-w-full">
                                                                            <Icon name="BookOpen" size={18} className="text-slate-400 shrink-0" />
                                                                            <span className="truncate">{log.title}</span>
                                                                        </h4>
                                                                        <div className="flex items-center gap-3 text-xs text-slate-500 shrink-0">
                                                                            {/* Date is removed from here since it's the timeline node */}
                                                                            <span className="flex items-center gap-1"><Icon name="User" size={12} /> {log.user}</span>
                                                                        </div>
                                                                    </div>
                                                                    <div className="text-sm text-slate-800 leading-[1.8] whitespace-pre-wrap break-words bg-slate-50/50 p-4 rounded-md border border-slate-100">
                                                                        {log.detail}
                                                                    </div>
                                                                    {log.url && (
                                                                        <div className="mt-4 pt-3 border-t border-slate-100 flex justify-end">
                                                                            <a href={log.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1.5 text-xs font-semibold text-primary bg-primary/5 hover:bg-primary/10 px-4 py-2 rounded-full transition-colors border border-primary/10">
                                                                                <Icon name="ExternalLink" size={14} /> 詳細な議事録を開く
                                                                            </a>
                                                                        </div>
                                                                    )}
                                                                </>
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    });
                                })()}
                            </div>
                        </div>
                    )}

                    {/* タブコンテンツ: アカウント情報 (Info) */}
                    {activeTab === 'info' && (
                        <div className="space-y-6 animate-in fade-in duration-300">

                            {/* Sub-tabs Navigation */}
                            <div className="flex flex-wrap gap-3 border-b border-slate-200 pb-4">
                                {[
                                    { id: 'basic', label: '基本情報', icon: 'Info' },
                                    { id: 'links', label: '集客リンク・SNS', icon: 'Link' },
                                    { id: 'ad', label: '広告設定・KPI', icon: 'BarChart2' },
                                    { id: 'creative', label: 'クリエイティブ素材', icon: 'Image' }
                                ].map(tab => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveInfoTab(tab.id)}
                                        className={`flex items-center gap-1.5 px-5 py-2 rounded-full text-sm font-semibold transition-colors shadow-sm ${activeInfoTab === tab.id ? 'bg-slate-800 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 hover:text-slate-900 border-b-2 border-b-transparent hover:border-b-slate-200'}`}
                                    >
                                        <Icon name={tab.icon} size={14} className={activeInfoTab === tab.id ? 'text-slate-300' : 'text-slate-400'} /> {tab.label}
                                    </button>
                                ))}
                            </div>

                            {/* 1. 基本情報 */}
                            {activeInfoTab === 'basic' && (
                                <div className="animate-in fade-in slide-in-from-bottom-2 duration-300">
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    {/* Card 1: 担当者・連絡先 (Contacts) */}
                                    <Card className="p-5 border-slate-200 bg-white shadow-sm relative h-fit hover:shadow-md transition-shadow">
                                        <div className="flex items-center justify-between mb-4 pb-3 border-b border-slate-100">
                                            <h4 className="font-bold text-slate-800 flex items-center gap-2">
                                                <Icon name="Users" size={16} className="text-blue-500" /> 担当者・連絡先
                                            </h4>
                                        </div>
                                        <div className="space-y-4">

        const LoginScreen = ({ onLogin }) => {
            const [password, setPassword] = useState("");
            const [error, setError] = useState("");
            
            const handleLogin = async (e) => {
                e.preventDefault();
                setError("");
                if (password === "admin2026") {
                    onLogin('admin', null);
                } else if (password) {
                    if (window.supabase) {
                        try {
                            const { data, error: sbError } = await window.supabase
                                .from('clients')
                                .select('*, ad_metrics!ad_metrics_client_id_fkey(*)')
                                .eq('view_password', password)
                                .single();
                            if (sbError || !data) {
                                setError("パスワードが間違っています");
                            } else {
                                const rawMetrics = Array.isArray(data.ad_metrics) ? data.ad_metrics : (data.ad_metrics ? [data.ad_metrics] : []);

                                let autoStatus = data.status;
                                if (autoStatus !== 'alert' && autoStatus !== 'rejected') {
                                    const sortedMetrics = [...rawMetrics].sort((a, b) => {
                                        const dateA = new Date(a.fetched_date || a.created_at || 0).getTime();
                                        const dateB = new Date(b.fetched_date || b.created_at || 0).getTime();
                                        return dateB - dateA;
                                    });
                                    const latestMetric = sortedMetrics.length > 0 ? sortedMetrics[0] : null;
                                    const latestImpressions = latestMetric ? (parseInt(latestMetric.impressions) || 0) : 0;
                                    autoStatus = latestImpressions > 0 ? 'active' : 'paused';
                                }

                                const mappedData = {
                                    id: data.id,
                                    name: data.name,
                                    assignee: data.assignee,
                                    clientContactName: data.client_contact_name,
                                    status: autoStatus,
                                    budget: data.budget || 0,
                                    targetCpa: data.target_cpa || 0,
                                    limitCpa: data.limit_cpa || 0,
                                    plan: data.plan,
                                    contractDate: data.contract_date,
                                    viewPassword: data.view_password,
                                    
                                    representativeName: data.representative_name,
                                    metaPlan: data.meta_plan,
                                    googlePlan: data.google_plan,
                                    lpVendor: data.lp_vendor,
                                    specialNotes: data.special_notes,

                                    businessDetails: data.business_details,
                                    serviceDetails: data.service_details,
                                    hearingNotes: data.hearing_notes,
                                    mainServices: data.main_services,

                                    urlLp1: data.url_lp1,
                                    urlLp2: data.url_lp2,
                                    urlLp3: data.url_lp3,
                                    urlWeb1: data.url_web1,
                                    urlWeb2: data.url_web2,
                                    urlWeb3: data.url_web3,

                                    urlHotpepper: data.url_hotpepper,
                                    urlInstagram: data.url_instagram,
                                    urlLine: data.url_line,
                                    urlTiktok: data.url_tiktok,
                                    urlX: data.url_x,
                                    urlYoutube: data.url_youtube,

                                    metaAdAccountId: data.meta_ad_account_id,
                                    pixelId: data.pixel_id,
                                    metaFbPage: data.meta_fb_page,
                                    metaIgAccount: data.meta_ig_account,

                                    googleCustomerId: data.google_customer_id,
                                    googleClientGmail: data.google_client_gmail,

                                    metaTargetCv: data.meta_target_cv,
                                    metaTargetCpa: data.target_cpa,
                                    metaLimitCpa: data.limit_cpa,

                                    googleTargetCv: data.google_target_cv,
                                    googleTargetCpa: data.google_target_cpa,
                                    googleLimitCpa: data.google_limit_cpa,

                                    urlGooglePhoto: data.url_google_photo,
                                    urlDrive: data.url_drive,
                                    urlDropbox: data.url_dropbox,
                                    urlOtherStorage: data.url_other_storage,
                                    urlCreativeFolder: data.url_creative_folder,

                                    rawMetrics: rawMetrics,
                                    spend: 0, 
                                    prevSpend: 0, 
                                    cvs: 0, 
                                    prevCvs: 0, 
                                    cpa: 0, 
                                    clicks: 0, 
                                    impressions: 0, 
                                    historyCvs: []
                                };

                                onLogin('client', mappedData);
                            }
                        } catch (err) {
                            setError("パスワードが間違っています");
                        }
                    } else {
                        setError("データベース接続がありません (開発環境用)");
                    }
                }
            };
            
            return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                    <Card className="w-full max-w-sm p-6 space-y-6 shadow-lg shadow-slate-200/50">

                                <Icon name="Lock" size={24} />
                            </div>
                            <h2 className="text-xl font-bold tracking-tight text-slate-900">管理者ログイン</h2>

                        <form onSubmit={handleLogin} className="space-y-4">

                                <input type="password" value={password} onChange={e => { setPassword(e.target.value); setError(""); }} className="w-full px-3 py-2 border border-slate-200 rounded-md text-sm outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all font-mono" placeholder="••••••••" autoFocus />
                                {error && <p className="text-xs text-red-500 font-medium">{error}</p>}

                            </button>

        };

        const App = () => {
            const [currentUserRole, setCurrentUserRole] = useState(null);
