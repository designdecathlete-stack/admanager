                                                                                        <input type="text" value={editHistoryForm.after} onChange={e => setEditHistoryForm({ ...editHistoryForm, after: e.target.value })} className="flex-1 p-2 border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/20 bg-slate-50 focus:bg-white" placeholder="変更後 (任意)" />
                                                                                    </div>
                                                                                    <div className="flex justify-end gap-2 pt-2">
                                                                                        <button onClick={() => setEditHistoryId(null)} className="px-3 py-1.5 text-xs font-medium text-slate-600 hover:bg-slate-200 bg-slate-100 rounded-md transition-colors">キャンセル</button>
                                                                                        <button onClick={handleSaveHistory} className="px-4 py-1.5 text-xs font-medium text-white bg-primary hover:bg-primary/90 rounded-md flex items-center gap-1.5 shadow-sm transition-colors"><Icon name="Save" size={14} /> 保存</button>
                                                                                    </div>
                                                                                </div>
                                                                            ) : (
                                                                                <>
                                                                                    <div className="absolute right-3 top-3 opacity-80 hover:opacity-100 transition-opacity flex gap-2 z-10">
                                                                                        <button onClick={() => { setEditHistoryId(log.id); setEditHistoryForm({ ...log }); }} className="px-3 py-1 text-[11px] font-bold text-indigo-600 hover:text-indigo-700 bg-indigo-50 hover:bg-indigo-100 border border-indigo-200/60 shadow-sm rounded-md flex items-center gap-1 transition-all"><Icon name="Edit3" size={12} /> 編集</button>
                                                                                        <button onClick={() => handleDeleteHistory(log.id)} className="px-3 py-1 text-[11px] font-bold text-rose-600 hover:text-rose-700 bg-rose-50 hover:bg-rose-100 border border-rose-200/60 shadow-sm rounded-md flex items-center gap-1 transition-all"><Icon name="Trash2" size={12} /> 削除</button>
                                                                                    </div>
                                                                                    <div className="flex flex-col sm:flex-row sm:items-center gap-3 mb-3 pr-32">
                                                                                        <div className="flex items-center gap-3">
                                                                                            <span className="font-semibold text-slate-900 text-sm flex items-center gap-1.5 bg-slate-100/80 px-2.5 py-1 rounded-md shadow-sm border border-slate-200/50">
                                                                                                <div className="w-5 h-5 rounded-full bg-primary/10 text-primary flex items-center justify-center text-[10px]"><Icon name="User" size={10} /></div>
                                                                                                {log.user}
                                                                                            </span>
                                                                                        </div>

                                                                                        <div className="flex items-center gap-2 flex-wrap">
                                                                                            {mainCat && (
                                                                                                <button
                                                                                                    onClick={() => { setHistoryFilterMainCat(mainCat); setHistoryFilterSubCat("all"); }}
                                                                                                    className="font-medium text-[11px] bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-full px-2.5 py-0.5 whitespace-nowrap shadow-sm transition-colors border border-indigo-100/50"
                                                                                                >
                                                                                                    {mainCat}
                                                                                                </button>
                                                                                            )}
                                                                                            {subCat && (
                                                                                                <>
                                                                                                    <Icon name="ChevronRight" size={12} className="text-slate-300" />
                                                                                                    <button
                                                                                                        onClick={() => { setHistoryFilterMainCat(mainCat); setHistoryFilterSubCat(subCat); }}
                                                                                                        className="font-medium text-[11px] bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full border border-slate-200 px-2.5 py-0.5 whitespace-nowrap shadow-sm transition-colors"
                                                                                                    >
                                                                                                        {subCat}
                                                                                                    </button>
                                                                                                </>
                                                                                            )}
                                                                                        </div>
                                                                                    </div>

                                                                                    {(log.before || log.after || log.detail) && (
                                                                                        <div className="mt-4 text-sm text-slate-800 leading-relaxed bg-slate-50/70 rounded-md border border-slate-100/80 overflow-hidden">
                                                                                            {(log.before || log.after) && (
                                                                                                <div className="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 p-3 border-b border-slate-100/80 bg-white/50">
                                                                                                    <div className="flex items-center gap-2 flex-1">
                                                                                                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider bg-slate-100 px-1.5 py-0.5 rounded border border-slate-200/50">変更前</span>
                                                                                                        <span className="font-medium text-slate-600 line-through decoration-slate-400">{log.before || "-"}</span>
                                                                                                    </div>
                                                                                                    <Icon name="ArrowRight" size={14} className="text-slate-300 hidden sm:block shrink-0" />
                                                                                                    <div className="flex items-center gap-2 flex-1">
                                                                                                        <span className="text-[10px] font-bold text-emerald-600 uppercase tracking-wider bg-emerald-50 px-1.5 py-0.5 rounded border border-emerald-100/50">変更後</span>
                                                                                                        <span className="font-bold text-emerald-700">{log.after || "-"}</span>
                                                                                                    </div>
                                                                                                </div>
                                                                                            )}
                                                                                            {log.detail && <div className="p-3.5"><p>{log.detail}</p></div>}
                                                                                        </div>
                                                                                    )}
                                                                                </>
                                                                            )}
                                                                        </div>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    );
                                })()}
                            </div>
                        </div>
                    )}

                    {/* タブコンテンツ: 議事録 (Minutes) */}
                    {activeTab === 'minutes' && (
                        <div className="space-y-6 animate-in fade-in duration-300">
                            <Card className="p-6 border-slate-200 bg-white shadow-sm">
                                <h3 className="text-sm font-bold text-slate-900 mb-5 flex items-center gap-2">
                                    <Icon name="FileEdit" size={18} className="text-primary" /> 新しい議事録を追加
                                </h3>
                                <form onSubmit={handleAddMinute} className="space-y-4">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-2">
                                            <label className="text-xs font-semibold text-slate-700 block">打ち合わせ日 <span className="text-red-500">*</span></label>
                                            <input
                                                type="date" required value={newMinuteDate} onChange={e => setNewMinuteDate(e.target.value)}
                                                className="w-full px-4 py-2 border border-slate-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 bg-slate-50 focus:bg-white"
                                            />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-xs font-semibold text-slate-700 block">タイトル（会議のテーマ） <span className="text-red-500">*</span></label>
                                            <input
                                                type="text" required value={newMinuteTitle} onChange={e => setNewMinuteTitle(e.target.value)}
                                                placeholder="例: 4月度定例ミーティング"
                                                className="w-full px-4 py-2 border border-slate-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 bg-slate-50 focus:bg-white"
                                            />
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-xs font-semibold text-slate-700 block">詳細議事録のURL（任意）</label>
                                        <div className="relative">
                                            <Icon name="Link" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                            <input
                                                type="url" value={newMinuteUrl} onChange={e => setNewMinuteUrl(e.target.value)}
                                                placeholder="例: https://notion.so/..."
                                                className="w-full pl-9 pr-4 py-2 border border-slate-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 bg-slate-50 focus:bg-white transition-colors"
                                            />
                                        </div>
                                    </div>

                                    <Card className="p-5 border-slate-200 bg-white shadow-sm relative h-fit hover:shadow-md transition-shadow">
                                        <div className="flex items-center justify-between mb-4 pb-3 border-b border-slate-100">
                                            <h4 className="font-bold text-slate-800 flex items-center gap-2">
                                                <Icon name="Image" size={16} className="text-amber-500" /> クリエイティブ & 素材
                                            </h4>
                                        </div>
                                        <div className="space-y-4">
                                            {[
                                                { id: 'assetUrl', label: '素材保管先 (Google Drive等)' },
                                                { id: 'guidelineUrl', label: 'ブランドガイドライン' }
                                            ].map(link => (
                                                <div key={link.id}>
                                                    <div className="text-xs font-semibold text-slate-500 mb-1">{link.label}</div>
                                                    {editingInfoField === link.id ? (
                                                        <input autoFocus type="url" value={clientInfo[link.id]} onChange={e => setClientInfo({ ...clientInfo, [link.id]: e.target.value })} onBlur={handleInfoSave} onKeyDown={e => e.key === 'Enter' && handleInfoSave()} className="w-full px-2 py-1 border rounded-md text-sm outline-none focus:border-primary focus:ring-1 focus:ring-primary/20" />
                                                    ) : (
                                                        <div onClick={() => setEditingInfoField(link.id)} className="text-sm truncate w-full cursor-pointer hover:bg-slate-50 p-2 -m-2 rounded transition-colors group flex items-center justify-between border border-transparent hover:border-slate-200 min-h-[32px]">
                                                            {clientInfo[link.id] ? <a href={clientInfo[link.id]} target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()} className="text-blue-600 hover:underline flex items-center gap-1"><Icon name="ExternalLink" size={12} className="shrink-0" /><span className="truncate">{clientInfo[link.id]}</span></a> : <span className="text-slate-400">未設定</span>}
                                                            <span className="text-xs font-normal text-slate-600 bg-white shadow-sm border border-slate-200 py-0.5 px-2 flex items-center gap-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap shrink-0 ml-2"><Icon name="Edit3" size={12} /> 編集</span>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </Card>
                                    </div>
                                    
                                    <div className="mt-10 pt-6 border-t border-red-100 flex justify-end">
                                        <button onClick={() => onDeleteClient(client.id)} className="bg-white border border-red-200 text-red-600 hover:bg-red-50 px-4 py-2 rounded-md font-medium text-sm flex items-center shadow-sm transition-colors cursor-pointer group">
                                            <Icon name="Trash2" size={16} className="mr-2 group-hover:scale-110 transition-transform" />
                                            このクライアントを完全に削除する
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            )
        };

        const App = () => {
            const [clients, setClients] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [view, setView] = useState("clientList");
            const [selectedClient, setSelectedClient] = useState(null);

            useEffect(() => {
                const fetchClients = async () => {
                    if (!supabase) {
                        setClients(initialClientsMock);
                        setIsLoading(false);
                        return;
                    }
                    try {
                        const { data, error } = await supabase.from('clients').select('*');
                        if (error) throw error;

                        const mapped = data.map(c => ({
                            id: c.id,
                            name: c.name,
                            assignee: c.assignee,
                            status: c.status || 'active',
                            budget: c.budget || 0,
                            targetCpa: c.target_cpa || 0,
                            limitCpa: c.limit_cpa || 0,
                            plan: c.plan,
                            contractDate: c.contract_date,
                            representativeName: c.representative_name,
                            businessDetails: c.business_details,
                            mainServices: c.main_services,
                            urlWebsite: c.url_website,
                            urlHotpepper: c.url_hotpepper,
                            urlLine: c.url_line,
                            urlInstagram: c.url_instagram,
                            pixelId: c.pixel_id,
                            urlDrive: c.url_drive,
                            urlGuideline: c.url_guideline,
                            // defaults for list view if no metrics yet
                            spend: 0, prevSpend: 0, cvs: 0, prevCvs: 0, cpa: 0, clicks: 0, impressions: 0, historyCvs: []
                        }));
                        setClients(mapped.length > 0 ? mapped : initialClientsMock);
                    } catch (err) {
                        console.error('Error', err);
                        setClients(initialClientsMock);
                    } finally {
                        setIsLoading(false);
                    }
                };
                fetchClients();
            }, []);

            const handleSelectClient = (client) => {
                setSelectedClient(client);
                setView("dashboard");
            };
            const handleBackToList = () => {
                setView("clientList");
                setSelectedClient(null);
            };
            const handleAddNew = () => setView("addClient");
            
            const handleSaveNewClient = async (newClient) => {
                if (!supabase) {
                    setClients(prev => [newClient, ...prev]);
                    setView("clientList");
                    return;
                }
                setIsLoading(true);
                try {
                    const dbData = {
                        name: newClient.name,
                        assignee: newClient.assignee,
                        plan: newClient.plan,
                        contract_date: newClient.contractDate || null,
                        status: 'paused',
                        budget: 0,
                        target_cpa: 0,
                        limit_cpa: 0
                    };
                    const { data, error } = await supabase.from('clients').insert([dbData]).select('*');
                    if (error) throw error;
                    if (data && data.length > 0) {
                        const c = data[0];
                        const mapped = {
                            id: c.id,
                            name: c.name,
                            assignee: c.assignee,
                            status: c.status,
                            budget: c.budget,
                            targetCpa: c.target_cpa,
                            limitCpa: c.limit_cpa,
                            plan: c.plan,
                            contractDate: c.contract_date,
                            representativeName: c.representative_name,
                            businessDetails: c.business_details,
                            mainServices: c.main_services,
                            urlWebsite: c.url_website,
                            urlHotpepper: c.url_hotpepper,
                            urlLine: c.url_line,
                            urlInstagram: c.url_instagram,
                            pixelId: c.pixel_id,
                            urlDrive: c.url_drive,
                            urlGuideline: c.url_guideline,
                            spend: 0, prevSpend: 0, cvs: 0, prevCvs: 0, cpa: 0, clicks: 0, impressions: 0, historyCvs: []
                        };
                        setClients(prev => [mapped, ...prev]);
                    }
                } catch(e) {
                    console.error("Error saving new client", e);
                } finally {
                    setIsLoading(false);
                    setView("clientList");
                }
            };

            const handleDeleteClient = async (clientId) => {
                if (window.confirm("本当にこのクライアントを完全に削除しますか？この操作は取り消せません。")) {
                    if (supabase && !("" + clientId).startsWith("cl")) {
                        try {
                            const { error } = await supabase.from('clients').delete().eq('id', clientId);
                            if (error) throw error;
                        } catch(e) {
                            console.error("Error deleting client", e);
                            alert("削除に失敗しました。関連データが残っている可能性があります。");
                            return;
                        }
                    }
                    setClients(prev => prev.filter(c => c.id !== clientId));
                    setSelectedClient(null);
                    setView("clientList");
                }
            };
            
            const handleUpdateClient = async (updatedClient) => {
                setClients(prev => prev.map(c => c.id === updatedClient.id ? updatedClient : c));
                setSelectedClient(prev => prev && prev.id === updatedClient.id ? updatedClient : prev);
                
                if (!supabase || ("" + updatedClient.id).startsWith("cl")) return; // Mock data
                
                try {
                    // Extract info sub-object if it was updated via Account Info tab
                    const info = updatedClient.info || {};
                    const updateData = {
                        name: updatedClient.name,
                        assignee: info.assignee !== undefined ? info.assignee : updatedClient.assignee,
                        status: updatedClient.status,
                        budget: updatedClient.budget,
                        target_cpa: updatedClient.targetCpa,
                        limit_cpa: updatedClient.limitCpa,
                        representative_name: info.clientContact !== undefined ? info.clientContact : updatedClient.representativeName,
                        business_details: info.businessDetails !== undefined ? info.businessDetails : updatedClient.businessDetails,
                        main_services: info.services !== undefined ? info.services : updatedClient.mainServices,
                        url_website: info.websiteUrl !== undefined ? info.websiteUrl : updatedClient.urlWebsite,
                        url_hotpepper: info.hotpepperUrl !== undefined ? info.hotpepperUrl : updatedClient.urlHotpepper,
                        url_line: info.lineUrl !== undefined ? info.lineUrl : updatedClient.urlLine,
                        url_instagram: info.instagramUrl !== undefined ? info.instagramUrl : updatedClient.urlInstagram,
                        pixel_id: info.pixelId !== undefined ? info.pixelId : updatedClient.pixelId,
                        url_drive: info.assetUrl !== undefined ? info.assetUrl : updatedClient.urlDrive,
                        url_guideline: info.guidelineUrl !== undefined ? info.guidelineUrl : updatedClient.urlGuideline
                    };
                    await supabase.from('clients').update(updateData).eq('id', updatedClient.id);
                } catch(e) {
                    console.error("Error updating client", e);
                }
            };

            return (
                <div className="min-h-screen flex text-slate-900 bg-slate-50">
                    <aside className="w-64 border-r border-slate-200 bg-white hidden md:flex flex-col flex-shrink-0 relative">
                        <div className="p-6 h-16 flex items-center border-b border-slate-100 cursor-pointer hover:bg-slate-50 transition-colors" onClick={handleBackToList}>
                            <h1 className="text-xl font-bold text-slate-900 flex items-center gap-2">
                                <span className="bg-primary text-primary-foreground p-1 rounded-md shadow-sm">
                                    <Icon name="Activity" size={20} />
                                </span>
                                AdManager
                            </h1>
                        </div>
                        <nav className="p-4 space-y-1 flex-1">
                            <button onClick={handleBackToList} className={`w-full flex items-center gap-3 px-3 py-2 rounded-md font-medium transition-colors ${view === 'clientList' ? 'bg-slate-100 text-slate-900' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}>
                                <Icon name="Users" size={18} className={view === 'clientList' ? "text-slate-700" : "text-slate-400"} />
                                クライアント一覧
                            </button>
                            <button onClick={handleAddNew} className={`w-full flex items-center gap-3 px-3 py-2 rounded-md font-medium transition-colors ${view === 'addClient' ? 'bg-primary/10 text-primary' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}>
                                <Icon name="PlusCircle" size={18} className={view === 'addClient' ? "text-primary" : "text-slate-400"} />
                                新規登録
                            </button>
                        </nav>
                    </aside>
                    <main className="flex-1 p-6 md:p-8 lg:p-10 max-w-7xl mx-auto w-full overflow-x-hidden">
                        {view === "clientList" && <ClientList clients={clients} onSelectClient={handleSelectClient} onAddNew={handleAddNew} onUpdateClient={handleUpdateClient} />}
                        {view === "dashboard" && selectedClient && <DashboardDetail client={selectedClient} onBack={handleBackToList} onUpdateClient={handleUpdateClient} onDeleteClient={handleDeleteClient} />}
                        {view === "addClient" && <AddClientForm onSave={handleSaveNewClient} onCancel={handleBackToList} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>

</html>
