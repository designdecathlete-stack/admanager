            const [clients, setClients] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [view, setView] = useState("clientList");
            const [selectedClient, setSelectedClient] = useState(null);
            
            const [isFetchingMeta, setIsFetchingMeta] = useState(false);
            const [teamMembers, setTeamMembers] = useState([]);

            const handleAddTeamMember = async (name) => {
                if (!supabase) return;
                try {
                    const { error } = await supabase.from('team_members').insert({ name });
                    if (error) throw error;
                    fetchTeamMembers();
                } catch (err) {
                    console.error("add member error", err);
                    alert("メンバーの追加に失敗しました。");
                }
            };

            const handleDeleteTeamMember = async (id) => {
                if (!window.confirm("この担当者を削除しますか？（※すでに割り当てられているクライアントの担当者欄は空欄になります）")) return;
                
                if (supabase) {
                    try {
                        const { error } = await supabase.from('team_members').delete().eq('id', id);
                        if (error) throw error;
                    } catch (err) {
                        console.error("Delete member error:", err);
                        alert("削除に失敗しました。");
                        return;
                    }
                }
                // 成功したら画面のリストから消す
                setTeamMembers(prev => prev.filter(m => m.id !== id));
            };
            const handleFetchMetaAds = async (targetClientId = null) => {
                if (!supabase) {
                    alert('Supabaseが接続されていません');
                    return;
                }
                setIsFetchingMeta(true);
                try {
                    const clientId = typeof targetClientId === 'string' ? targetClientId : null;
                    const options = clientId ? { body: { client_id: clientId } } : {};
                    const { data, error } = await supabase.functions.invoke('fetch-meta-ads', options);
                    if (error) throw error;

                    const detailsText = data?.details ? data.details.map(d => `・${d.name}: ${d.status} ${d.rows ? `(${d.rows}件)` : ''}`).join('\n') : '詳細データがありません';
                    alert(`METAデータの同期が完了しました！\n\n【同期結果】\n${detailsText}`);

                    await fetchClients();
                } catch (err) {
                    console.error("META fetch error:", err);
                    alert(`METAデータの同期に失敗しました: ${err.message || '不明なエラー'}`);
                } finally {
                    setIsFetchingMeta(false);
                }
            };

            const fetchClients = useCallback(async () => {
                if (!supabase) {
                        alert("データ取得エラー: Supabaseクライアントが初期化されていません。");
                        setIsLoading(false);
                        return;
                    }
                    try {
                        const { data, error } = await supabase.from('clients').select('*, ad_metrics!ad_metrics_client_id_fkey(*)');
                        if (error) throw error;

                        console.log("Fetched clients data with ad_metrics:", data);

                        const mapped = data.map(c => {
                            const rawMetrics = Array.isArray(c.ad_metrics) ? c.ad_metrics : (c.ad_metrics ? [c.ad_metrics] : []);

                            let autoStatus = c.status;
                            if (autoStatus !== 'alert' && autoStatus !== 'rejected') {
                                // 並び替えて最新の日付のレコード1件を取得する
                                const sortedMetrics = [...rawMetrics].sort((a, b) => {
                                    const dateA = new Date(a.fetched_date || a.created_at || 0).getTime();
                                    const dateB = new Date(b.fetched_date || b.created_at || 0).getTime();
                                    return dateB - dateA;
                                });
                                
                                const latestMetric = sortedMetrics.length > 0 ? sortedMetrics[0] : null;
                                const latestImpressions = latestMetric ? (parseInt(latestMetric.impressions) || 0) : 0;
                                
                                autoStatus = latestImpressions > 0 ? 'active' : 'paused';
                            }

                            return {
                                id: c.id,
                                name: c.name,
                                assignee: c.assignee,
                                clientContactName: c.client_contact_name,
                                status: autoStatus,
                                budget: c.budget || 0,
                                targetCpa: c.target_cpa || 0,
                                limitCpa: c.limit_cpa || 0,
                                plan: c.plan,
                                contractDate: c.contract_date,
                                viewPassword: c.view_password,
                                
                                representativeName: c.representative_name,
                                metaPlan: c.meta_plan,
                                googlePlan: c.google_plan,
                                lpVendor: c.lp_vendor,
                                specialNotes: c.special_notes,

                                businessDetails: c.business_details,
                                serviceDetails: c.service_details,
                                hearingNotes: c.hearing_notes,
                                mainServices: c.main_services,

                                urlLp1: c.url_lp1,
                                urlLp2: c.url_lp2,
                                urlLp3: c.url_lp3,
                                urlWeb1: c.url_web1,
                                urlWeb2: c.url_web2,
                                urlWeb3: c.url_web3,

                                urlHotpepper: c.url_hotpepper,
                                urlInstagram: c.url_instagram,
                                urlLine: c.url_line,
                                urlTiktok: c.url_tiktok,
                                urlX: c.url_x,
                                urlYoutube: c.url_youtube,

                                metaAdAccountId: c.meta_ad_account_id,
                                pixelId: c.pixel_id,
                                metaFbPage: c.meta_fb_page,
                                metaIgAccount: c.meta_ig_account,

                                googleCustomerId: c.google_customer_id,
                                googleClientGmail: c.google_client_gmail,

                                metaTargetCv: c.meta_target_cv,
                                metaTargetCpa: c.target_cpa,
                                metaLimitCpa: c.limit_cpa,

                                googleTargetCv: c.google_target_cv,
                                googleTargetCpa: c.google_target_cpa,
                                googleLimitCpa: c.google_limit_cpa,

                                urlGooglePhoto: c.url_google_photo,
                                urlDrive: c.url_drive,
                                urlDropbox: c.url_dropbox,
                                urlOtherStorage: c.url_other_storage,
                                urlCreativeFolder: c.url_creative_folder,

                                // Map the raw ad_metrics data for dynamic sum downstream
                                rawMetrics: rawMetrics,
                                spend: 0, 
                                prevSpend: 0, 
                                cvs: 0, 
                                prevCvs: 0, 
                                cpa: 0, 
                                clicks: 0, 
                                impressions: 0, 
                                historyCvs: []
                            };
                        });
                        setClients(mapped);
                    } catch (err) {
                        console.error('Error', err);
                        alert("データ取得エラー: " + err.message);
                    } finally {
                        setIsLoading(false);
                    }
                }, []);
    
                const fetchTeamMembers = useCallback(async () => {
                    if (!supabase) return;
                    try {
                        const { data, error } = await supabase.from('team_members').select('id, name').order('name');
                        if (error) throw error;
                        setTeamMembers(data || []);
                    } catch(err) {
                        console.error("fetch team_members error", err);
                    }
                }, []);

                useEffect(() => {
                    fetchClients();
                    fetchTeamMembers();
                }, [fetchClients, fetchTeamMembers]);

                useEffect(() => {
                    const handleHashChange = () => {
                    const hash = window.location.hash;
                    if (hash.startsWith('#/client/')) {
                        const clientId = hash.replace('#/client/', '');
                        const client = clients.find(c => String(c.id) === String(clientId));
                        if (client) {
                            setSelectedClient(client);
                            setView("dashboard");
                        } else if (!isLoading) {
                            window.location.hash = '';
                        }
                    } else if (hash === '#/new') {
                        setView("addClient");
                        setSelectedClient(null);
                    } else {
                        setView("clientList");
                        setSelectedClient(null);
                    }
                };
                
                window.addEventListener('hashchange', handleHashChange);
                if (!isLoading) {
                    handleHashChange();
                }
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, [clients, isLoading]);

            const handleSelectClient = (client) => {
                window.location.hash = `#/client/${client.id}`;
            };
            const handleBackToList = () => {
                window.location.hash = '';
            };
            const handleAddNew = () => {
                window.location.hash = '#/new';
            };
            
            const handleSaveNewClient = async (newClient) => {
                if (!supabase) {
                    setClients(prev => [newClient, ...prev]);
                    alert("新規クライアントの登録が完了しました！");
                    setView("clientList");
                    return;
                }
                setIsLoading(true);
                try {
                    const dbData = {
                        name: newClient.name,
                        assignee: newClient.assignee,
                        representative_name: newClient.representativeName || null,
                        plan: newClient.plan,
                        contract_date: newClient.contractDate || null,
                        view_password: newClient.view_password || null,
                        status: 'paused',
                        budget: 0,
                        target_cpa: 0,
                        limit_cpa: 0
                    };
                    const { data, error } = await supabase.from('clients').insert([dbData]).select('*');
                    if (error) throw error;
                    if (data && data.length > 0) {
                        const c = data[0];
                        const mapped = {
                            id: c.id,
                            name: c.name,
                            assignee: c.assignee,
                            status: c.status,
                            budget: c.budget,
                            targetCpa: c.target_cpa,
                            limitCpa: c.limit_cpa,
                            plan: c.plan,
                            contractDate: c.contract_date,
                            viewPassword: c.view_password,
                            representativeName: c.representative_name,
                            businessDetails: c.business_details,
                            mainServices: c.main_services,
                            urlWebsite: c.url_website,
                            urlHotpepper: c.url_hotpepper,
                            urlLine: c.url_line,
                            urlInstagram: c.url_instagram,
                            pixelId: c.pixel_id,
                            urlDrive: c.url_drive,
                            urlGuideline: c.url_guideline,
                            spend: 0, prevSpend: 0, cvs: 0, prevCvs: 0, cpa: 0, clicks: 0, impressions: 0, historyCvs: []
                        };
                        setClients(prev => [mapped, ...prev]);
                        alert("新規クライアントの登録が完了しました！");
                    }
                } catch(e) {
                    console.error("Error saving new client", e);
                } finally {
                    setIsLoading(false);
                    setView("clientList");
                }
            };

            const handleDeleteClient = async (clientId) => {
                if (window.confirm("本当にこのクライアントを完全に削除しますか？この操作は取り消せません。")) {
                    if (supabase && !("" + clientId).startsWith("cl")) {
                        try {
                            const { error } = await supabase.from('clients').delete().eq('id', clientId);
                            if (error) throw error;
                        } catch(e) {
                            console.error("Error deleting client", e);
                            alert("削除に失敗しました。関連データが残っている可能性があります。");
                            return;
                        }
                    }
                    setClients(prev => prev.filter(c => c.id !== clientId));
                    setSelectedClient(null);
                    setView("clientList");
                }
            };
            
            const handleUpdateClient = async (updatedClient) => {
                setClients(prev => prev.map(c => c.id === updatedClient.id ? updatedClient : c));
                setSelectedClient(prev => prev && prev.id === updatedClient.id ? updatedClient : prev);
                
                if (!supabase || ("" + updatedClient.id).startsWith("cl")) return; // Mock data
                
                try {
                    // Extract info sub-object if it was updated via Account Info tab
                    const info = updatedClient.info || {};

                    const getVal = (iVal, cVal) => {
                        const v = iVal !== undefined ? iVal : cVal;
                        return v === "" || v === undefined ? null : v;
                    };
                    const getNum = (iVal, cVal) => {
                        const v = iVal !== undefined ? iVal : cVal;
                        return v === "" || v === undefined ? null : parseFloat(v);
                    };

                    const updateData = {
                        name: updatedClient.name !== "" && updatedClient.name !== undefined ? updatedClient.name : null,
                        assignee: updatedClient.assignee !== undefined ? updatedClient.assignee : null,
                        client_contact_name: getVal(info.clientContactName, updatedClient.clientContactName),
                        view_password: getVal(info.viewPassword, updatedClient.viewPassword),
                        status: updatedClient.status !== "" && updatedClient.status !== undefined ? updatedClient.status : null,
                        budget: updatedClient.budget !== "" && updatedClient.budget !== undefined ? parseFloat(updatedClient.budget) : null,
                        
                        representative_name: getVal(info.representativeName, updatedClient.representativeName),
                        meta_plan: getVal(info.metaAdPlan, updatedClient.metaPlan),
                        google_plan: getVal(info.googleAdPlan, updatedClient.googlePlan),
                        lp_vendor: getVal(info.lpCreator, updatedClient.lpVendor),
                        special_notes: getVal(info.contractNotes, updatedClient.specialNotes),

                        business_details: getVal(info.businessDetails, updatedClient.businessDetails),
                        service_details: getVal(info.serviceDetails, updatedClient.serviceDetails),
                        hearing_notes: getVal(info.initialHearing, updatedClient.hearingNotes),
                        main_services: getVal(info.services, updatedClient.mainServices),

                        url_lp1: getVal(info.lpUrl1, updatedClient.urlLp1),
                        url_lp2: getVal(info.lpUrl2, updatedClient.urlLp2),
                        url_lp3: getVal(info.lpUrl3, updatedClient.urlLp3),
                        url_web1: getVal(info.websiteUrl1, updatedClient.urlWeb1),
                        url_web2: getVal(info.websiteUrl2, updatedClient.urlWeb2),
                        url_web3: getVal(info.websiteUrl3, updatedClient.urlWeb3),

                        url_hotpepper: getVal(info.hotpepperUrl, updatedClient.urlHotpepper),
                        url_instagram: getVal(info.instagramUrl, updatedClient.urlInstagram),
                        url_line: getVal(info.lineUrl, updatedClient.urlLine),
                        url_tiktok: getVal(info.tiktokUrl, updatedClient.urlTiktok),
                        url_x: getVal(info.xUrl, updatedClient.urlX),
                        url_youtube: getVal(info.youtubeUrl, updatedClient.urlYoutube),

                        meta_ad_account_id: getVal(info.metaAdAccountId, updatedClient.metaAdAccountId),
                        pixel_id: getVal(info.pixelId, updatedClient.pixelId),
                        meta_fb_page: getVal(info.metaFacebookPage, updatedClient.metaFbPage),
                        meta_ig_account: getVal(info.metaInstagramAccount, updatedClient.metaIgAccount),

                        google_customer_id: getVal(info.googleAdAccountId, updatedClient.googleCustomerId),
                        google_client_gmail: getVal(info.googleClientGmail, updatedClient.googleClientGmail),

                        meta_target_cv: getNum(info.metaTargetConversions, updatedClient.metaTargetCv),
                        target_cpa: getNum(info.metaTargetCpa, updatedClient.metaTargetCpa),
                        limit_cpa: getNum(info.metaLimitCpa, updatedClient.metaLimitCpa),

                        google_target_cv: getNum(info.googleTargetConversions, updatedClient.googleTargetCv),
                        google_target_cpa: getNum(info.googleTargetCpa, updatedClient.googleTargetCpa),
                        google_limit_cpa: getNum(info.googleLimitCpa, updatedClient.googleLimitCpa),

                        url_google_photo: getVal(info.assetGooglePhoto, updatedClient.urlGooglePhoto),
                        url_drive: getVal(info.assetGoogleDrive, updatedClient.urlDrive),
                        url_dropbox: getVal(info.assetDropbox, updatedClient.urlDropbox),
                        url_other_storage: getVal(info.assetOther, updatedClient.urlOtherStorage),
                        url_creative_folder: getVal(info.creativeStorageUrl, updatedClient.urlCreativeFolder)
                    };

                    const { error } = await supabase.from('clients').update(updateData).eq('id', updatedClient.id);
                    if (error) {
                        alert("保存に失敗しました: " + error.message);
                        throw error;
                    }
                } catch(e) {
                    console.error("Error updating client", e);
                }
            };

            if (!isAuthenticated) return <LoginScreen onLogin={(role, clientData) => { 
                setIsAuthenticated(true); 
                setCurrentUserRole(role); 
                if (role === 'client' && clientData) {
                    setSelectedClient(clientData);
                    setView('dashboard');
                }
            }} />;

            return (
                <div className="min-h-screen flex text-slate-900 bg-slate-50">
                    {currentUserRole === 'admin' && (
                        <aside className="w-64 border-r border-slate-200 bg-white hidden md:flex flex-col flex-shrink-0 relative">
                            <div className="p-6 h-16 flex items-center border-b border-slate-100 cursor-pointer hover:bg-slate-50 transition-colors" onClick={handleBackToList}>
                                <h1 className="text-xl font-bold text-slate-900 flex items-center gap-2">
                                    <span className="bg-primary text-primary-foreground p-1 rounded-md shadow-sm">
                                        <Icon name="Activity" size={20} />
                                    </span>
                                    AdManager
                                </h1>
                            </div>
                            <nav className="p-4 space-y-1 flex-1">
                                <button onClick={handleBackToList} className={`w-full flex items-center gap-3 px-3 py-2 rounded-md font-medium transition-colors ${view === 'clientList' ? 'bg-slate-100 text-slate-900' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}>
                                    <Icon name="Users" size={18} className={view === 'clientList' ? "text-slate-700" : "text-slate-400"} />
                                    クライアント一覧
                                </button>
                                <button onClick={handleAddNew} className={`w-full flex items-center gap-3 px-3 py-2 rounded-md font-medium transition-colors ${view === 'addClient' ? 'bg-primary/10 text-primary' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}>
                                    <Icon name="PlusCircle" size={18} className={view === 'addClient' ? "text-primary" : "text-slate-400"} />
                                    新規登録
                                </button>
                                <button onClick={() => { setView('settings'); setSelectedClient(null); }} className={`w-full flex items-center gap-3 px-3 py-2 rounded-md font-medium transition-colors ${view === 'settings' ? 'bg-slate-100 text-slate-900' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}>
                                    <Icon name="Settings" size={18} className={view === 'settings' ? "text-slate-700" : "text-slate-400"} />
                                    設定
                                </button>
                            </nav>
                        </aside>
                    )}
                    <main className="flex-1 p-6 md:p-8 lg:p-10 max-w-7xl mx-auto w-full overflow-x-hidden">
                        {view === "clientList" && <ClientList clients={clients} onSelectClient={handleSelectClient} onAddNew={handleAddNew} onUpdateClient={handleUpdateClient} onReloadData={fetchClients} onFetchMetaAds={handleFetchMetaAds} isFetchingMeta={isFetchingMeta} />}
                        {view === "dashboard" && selectedClient && <DashboardDetail role={currentUserRole} client={selectedClient} onBack={handleBackToList} onUpdateClient={handleUpdateClient} onDeleteClient={handleDeleteClient} onFetchMetaAds={handleFetchMetaAds} isFetchingMeta={isFetchingMeta} teamMembers={teamMembers} />}
                        {view === "addClient" && <AddClientForm onSave={handleSaveNewClient} onCancel={handleBackToList} teamMembers={teamMembers} />}
                        {view === "settings" && <SettingsView teamMembers={teamMembers} onAddMember={handleAddTeamMember} handleDeleteTeamMember={handleDeleteTeamMember} onBack={handleBackToList} onFetchMetaAds={handleFetchMetaAds} isFetchingMeta={isFetchingMeta} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>

</html>
