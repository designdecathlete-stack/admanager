<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta広告 統合管理ダッシュボード</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: "hsl(var(--border))",
                        input: "hsl(var(--input))",
                        ring: "hsl(var(--ring))",
                        background: "hsl(var(--background))",
                        foreground: "hsl(var(--foreground))",
                        primary: { DEFAULT: "hsl(222.2 47.4% 11.2%)", foreground: "hsl(210 40% 98%)" },
                        secondary: { DEFAULT: "hsl(210 40% 96.1%)", foreground: "hsl(222.2 47.4% 11.2%)" },
                        destructive: { DEFAULT: "hsl(0 84.2% 60.2%)", foreground: "hsl(210 40% 98%)" },
                        muted: { DEFAULT: "hsl(210 40% 96.1%)", foreground: "hsl(215.4 16.3% 46.9%)" },
                        accent: { DEFAULT: "hsl(210 40% 96.1%)", foreground: "hsl(222.2 47.4% 11.2%)" },
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
        :root {
          --background: 0 0% 100%;
          --foreground: 222.2 84% 4.9%;
          --card: 0 0% 100%;
          --card-foreground: 222.2 84% 4.9%;
          --popover: 0 0% 100%;
          --popover-foreground: 222.2 84% 4.9%;
          --primary: 222.2 47.4% 11.2%;
          --primary-foreground: 210 40% 98%;
          --secondary: 210 40% 96.1%;
          --secondary-foreground: 222.2 47.4% 11.2%;
          --muted: 210 40% 96.1%;
          --muted-foreground: 215.4 16.3% 46.9%;
          --accent: 210 40% 96.1%;
          --accent-foreground: 222.2 47.4% 11.2%;
          --destructive: 0 84.2% 60.2%;
          --destructive-foreground: 210 40% 98%;
          --border: 214.3 31.8% 91.4%;
          --input: 214.3 31.8% 91.4%;
          --ring: 222.2 84% 4.9%;
          --radius: 0.5rem;
        }
      }
      body {
        @apply bg-slate-50 text-foreground antialiased font-sans;
      }
      /* Custom Scrollbar for Tabs */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div id="root">
        <div style="padding: 20px; text-align: center; color: #666; font-family: sans-serif;">
            Loading Application...
        </div>
    </div>

    <script type="text/babel">
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ padding: '2rem', color: '#ef4444', backgroundColor: '#fef2f2', minHeight: '100vh', fontFamily: 'sans-serif' }}>
                            <h1 style={{ fontSize: '1.5rem', fontWeight: 'bold', marginBottom: '1rem' }}>Application Error</h1>
                            <pre style={{ whiteSpace: 'pre-wrap', backgroundColor: '#fee2e2', padding: '1rem', borderRadius: '0.5rem' }}>
                                {this.state.error && this.state.error.toString()}
                            </pre>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const { useState, useEffect, useMemo, useCallback } = React;

        const SUPABASE_URL = "https://mfnsggsmsjerjugppfwh.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_dHM5W8jcyuYxNVMY_-Zfhg_BBQ5YZ1S";
        const supabase = window.supabase && SUPABASE_URL !== "YOUR_SUPABASE_URL_HERE" ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = React.useRef(null);

            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    // Lucideのアイコンデータを取得
                    let iconData = window.lucide.icons ? window.lucide.icons[name] : window.lucide[name];
                    
                    // 指定されたアイコン名が存在しない場合のフォールバック
                    if (!iconData) {
                        iconData = window.lucide.icons ? window.lucide.icons['HelpCircle'] : window.lucide['HelpCircle'];
                    }

                    // Lucide標準の createElement で SVG を生成して挿入
                    if (iconData && window.lucide.createElement) {
                        const svg = window.lucide.createElement(iconData);
                        svg.setAttribute('width', size);
                        svg.setAttribute('height', size);
                        if (className) svg.setAttribute('class', className);
                        iconRef.current.innerHTML = '';
                        iconRef.current.appendChild(svg);
                    }
                }
            }, [name, size, className]);

            return <i ref={iconRef} className={`inline-flex items-center justify-center shrink-0 ${className}`} style={{ width: size, height: size }} />;
        };

        const Card = ({ children, className = "" }) => (
            <div className={`rounded-xl border bg-card text-card-foreground shadow-sm bg-white ${className}`}>{children}</div>
        );

        const Badge = ({ children, variant = "default", className = "" }) => {
            const variants = {
                default: "bg-primary text-primary-foreground",
                active: "bg-emerald-100 text-emerald-800 border-emerald-200",
                paused: "bg-slate-100 text-slate-800 border-slate-200",
                rejected: "bg-red-100 text-red-600 border-red-200",
                alert: "bg-amber-100 text-amber-800 border-amber-200",
                secondary: "bg-slate-100 text-slate-700 border border-slate-200",
            };
            return (
                <span className={`inline-flex items-center rounded-full border px-2.5 py-0.5 text-xs font-semibold flex-shrink-0 ${variants[variant] || variants.default} ${className}`}>
                    {children}
                </span>
            );
        };

        const formatCurrency = (val) => new Intl.NumberFormat("ja-JP", { style: "currency", currency: "JPY" }).format(val);
        const formatNumber = (val) => new Intl.NumberFormat("ja-JP").format(val);
        const formatDecimal = (val) => new Intl.NumberFormat("ja-JP", { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(val);
        const formatPercent = (val) => new Intl.NumberFormat("ja-JP", { style: "percent", minimumFractionDigits: 1 }).format(val / 100);



        const Sparkline = ({ data, color = "#10b981" }) => {
            if (!data || data.length === 0) return null;
            const max = Math.max(...data);
            const min = Math.min(...data);
            const range = max - min || 1;
            const width = 60, height = 24;
            const points = data.map((val, i) => `${(i / (data.length - 1)) * width},${height - ((val - min) / range) * height}`).join(" ");
            return (
                <svg width={width} height={height} viewBox={`0 -2 ${width} ${height + 4}`} className="overflow-visible stroke-current fill-none">
                    <polyline points={points} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ color }} />
                </svg>
            );
        };



        const AddClientForm = ({ onSave, onCancel, teamMembers }) => {
            const [formData, setFormData] = useState({ name: "", adAccountId: "", assignee: "", representativeName: "", plan: "スタンダード", contractDate: "", view_password: "" });
            const handleChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.name || !formData.plan) return;
                onSave({ id: `cl${Date.now()}`, ...formData, budget: 0, targetCpa: 0, limitCpa: 0, targetCvs: 0, spend: 0, prevSpend: 0, cvs: 0, prevCvs: 0, cpa: 0, clicks: 0, prevClicks: 0, impressions: 0, alertReason: "", historyCvs: [], status: "paused" });
            };
            return (
                <div className="max-w-3xl mx-auto space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <header className="mb-6 pb-4 border-b border-slate-200 flex items-center gap-4">
                        <button type="button" onClick={onCancel} className="text-slate-400 hover:text-slate-900 transition-colors p-2 -ml-2 rounded-full hover:bg-slate-100"><Icon name="ArrowLeft" size={20} /></button>
                        <div>
                            <h2 className="text-2xl font-bold text-slate-900">新規クライアント登録</h2>
                            <p className="text-sm text-slate-500 mt-1">システム連携用のIDや基本情報を入力してください。</p>
                        </div>
                    </header>
                    <form onSubmit={handleSubmit}>
                        <Card className="p-6 space-y-8 shadow-sm">
                            <div className="grid md:grid-cols-2 gap-6">
                                <div className="space-y-2"><label className="text-sm font-medium text-slate-700">クライアント名 <span className="text-red-500">*</span></label><input required name="name" value={formData.name} onChange={handleChange} className="w-full px-3 py-2 border border-slate-200 rounded-md text-sm outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all shadow-sm" placeholder="株式会社〇〇" /></div>
                                <div className="space-y-2">
                                    <label className="text-sm font-medium text-slate-700">代表者名（クライアント側）</label>
                                    <input type="text" name="representativeName" value={formData.representativeName || ''} onChange={handleChange} className="w-full px-3 py-2 border border-slate-200 rounded-md text-sm outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all shadow-sm" placeholder="例: 山田 太郎" />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-sm font-medium text-slate-700">運用担当者（社内）</label>
                                    <select name="assignee" value={formData.assignee || ''} onChange={handleChange} className="w-full px-3 py-2 border border-slate-200 rounded-md text-sm outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all shadow-sm bg-white cursor-pointer">
                                        <option value="">未設定</option>
                                        {teamMembers && teamMembers.map(member => (
                                            <option key={member.name} value={member.name}>{member.name}</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-sm font-medium text-slate-700">契約プラン <span className="text-red-500">*</span></label>
                                    <select required name="plan" value={formData.plan} onChange={handleChange} className="w-full px-3 py-2 border border-slate-200 rounded-md text-sm outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all shadow-sm bg-white cursor-pointer">
                                        <option value="ライト">ライト</option>
                                        <option value="スタンダード">スタンダード</option>
                                        <option value="プレミアム">プレミアム</option>
                                    </select>
                                </div>
                                <div className="space-y-2"><label className="text-sm font-medium text-slate-700">契約日時</label><input type="date" name="contractDate" value={formData.contractDate} onChange={handleChange} className="w-full px-3 py-2 border border-slate-200 rounded-md text-sm outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all shadow-sm text-slate-700 cursor-pointer" /></div>
                                <div className="space-y-2"><label className="text-sm font-medium text-slate-700">クライアント用閲覧パスワード</label><input type="text" name="view_password" value={formData.view_password} onChange={handleChange} className="w-full px-3 py-2 border border-slate-200 rounded-md text-sm outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all shadow-sm font-mono placeholder:font-sans" placeholder="example_pass123 (任意)" /></div>
                            </div>
                            <div className="flex justify-end gap-3 pt-4 border-t border-slate-100">
                                <button type="button" onClick={onCancel} className="px-6 py-2 rounded-md border border-slate-200 text-slate-700 hover:bg-slate-50 font-medium text-sm transition-colors shadow-sm">キャンセル</button>
                                <button type="submit" className="bg-primary text-white hover:bg-primary/90 px-6 py-2 rounded-md font-medium text-sm transition-colors shadow-sm">保存する</button>
                            </div>
                        </Card>
                    </form>
                </div>
            )
        };

        const CompBadge = ({ cur, prev, reverseColor = false }) => {
            if (!prev) return <div className="text-[10px] text-slate-400 mt-0.5 min-h-[16px]">-</div>;
            const diff = cur - prev;
            if (diff === 0) return <div className="text-[10px] text-slate-400 mt-0.5 flex items-center justify-end gap-0.5 relative z-10"><Icon name="Minus" size={10} /> 0%</div>;
            const pct = ((diff / prev) * 100).toFixed(1);
            const color = diff > 0 ? (reverseColor ? "text-red-500" : "text-emerald-500") : (reverseColor ? "text-emerald-500" : "text-red-500");
            const icon = diff > 0 ? "TrendingUp" : "TrendingDown";
            return (
                <div className={`text-[11px] font-bold mt-0.5 flex items-center justify-end gap-0.5 relative z-10 ${color}`}>
                    <Icon name={icon} size={12} /> {Math.abs(pct)}%
                </div>
            );
        };

        const ClientList = ({ clients, onSelectClient, onAddNew, onUpdateClient, onReloadData, onFetchMetaAds, isFetchingMeta }) => {
            const [search, setSearch] = useState("");
            const [assigneeFilter, setAssigneeFilter] = useState("all");
            const [dateRange, setDateRange] = useState("this_month");
            const [sortConfig, setSortConfig] = useState({ key: 'name', direction: 'asc' });
            const [editingInput, setEditingInput] = useState({ id: null, field: null, value: "" });
            const [menuOpen, setMenuOpen] = useState(null);


            const handleSort = (key) => setSortConfig(prev => ({ key, direction: prev.key === key && prev.direction === 'asc' ? 'desc' : 'asc' }));

            const handleSaveEdit = (client, field) => {
                const valStr = String(editingInput.value);
                const num = parseInt(valStr.replace(/,/g, ''));
                if (!isNaN(num)) onUpdateClient({ ...client, [field]: num });
                setEditingInput({ id: null, field: null, value: "" });
            };

            const uniqueAssignees = Array.from(new Set(clients.map(c => c.assignee).filter(Boolean)));

            const now = new Date();
            let startDate = new Date();
            let endDate = new Date();
            
            if (dateRange === 'this_month') {
                startDate = new Date(now.getFullYear(), now.getMonth(), 1);
                endDate = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59);
            } else if (dateRange === 'last_month') {
                startDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                endDate = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59);
            } else if (dateRange === 'last_7') {
                startDate = new Date();
                startDate.setDate(now.getDate() - 7);
                startDate.setHours(0, 0, 0, 0);
            }

            const enriched = clients.map(c => {
                const validMetrics = (c.rawMetrics || []).filter(m => {
                    const d = new Date(m.fetched_date || m.created_at || Date.now());
                    return d >= startDate && d <= endDate;
                });
                const spend = validMetrics.reduce((sum, m) => sum + (parseFloat(m.spend) || 0), 0);
                const impressions = validMetrics.reduce((sum, m) => sum + (parseInt(m.impressions) || 0), 0);
                const clicks = validMetrics.reduce((sum, m) => sum + (parseInt(m.clicks) || 0), 0);
                const cvs = validMetrics.reduce((sum, m) => sum + (parseFloat(m.conversions) || 0), 0);
                
                return {
                    ...c,
                    spend,
                    impressions,
                    clicks,
                    cvs,
                    cpa: cvs > 0 ? spend / cvs : 0,
                    ctr: impressions > 0 ? (clicks / impressions) * 100 : 0
                };
            });

            let processed = enriched.filter(c => {
                const matchSearch = c.name.toLowerCase().includes(search.toLowerCase()) || (c.adAccountId && c.adAccountId.includes(search));
                const matchAssignee = assigneeFilter === "all" || c.assignee === assigneeFilter;
                return matchSearch && matchAssignee;
            });

            processed.sort((a, b) => {
                if (a[sortConfig.key] < b[sortConfig.key]) return sortConfig.direction === 'asc' ? -1 : 1;
                if (a[sortConfig.key] > b[sortConfig.key]) return sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
            });

            const SortIcon = ({ column }) => (
                <Icon name={sortConfig.key === column ? (sortConfig.direction === 'asc' ? "ChevronUp" : "ChevronDown") : "ChevronsUpDown"} size={14} className={sortConfig.key === column ? "text-primary" : "text-slate-300 drop-shadow-sm opacity-50 hover:opacity-100 transition-opacity"} />
            );

            return (
                <div className="space-y-6 animate-in fade-in slide-in-from-bottom-2 duration-300 pb-20">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <h2 className="text-2xl font-bold tracking-tight text-slate-900">クライアント一覧</h2>
                        <div className="flex flex-wrap items-center gap-3">
                            <select value={dateRange} onChange={(e) => setDateRange(e.target.value)} className="pl-3 pr-8 py-2 border border-slate-200 rounded-md text-sm focus:outline-none focus:border-primary appearance-none bg-white font-medium cursor-pointer shadow-sm">
                                <option value="this_month">今月</option><option value="last_month">先月</option><option value="last_7">過去7日間</option>
                            </select>
                            <div className="relative border border-slate-200 rounded-md shadow-sm">
                                <select value={assigneeFilter} onChange={(e) => setAssigneeFilter(e.target.value)} className="pl-3 pr-8 py-2 w-full text-sm block appearance-none bg-white rounded-md focus:outline-none focus:border-primary font-medium text-slate-700 cursor-pointer">
                                    <option value="all">全担当者</option>
                                    {uniqueAssignees.map(a => <option key={a} value={a}>{a}</option>)}
                                </select>
                                <Icon name="Filter" size={14} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" />
                            </div>
                            <input type="text" placeholder="キーワード検索" className="pl-3 pr-4 py-2 border border-slate-200 rounded-md text-sm min-w-[200px] shadow-sm" value={search} onChange={(e) => setSearch(e.target.value)} />

                            <button onClick={onAddNew} className="bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-md font-medium text-sm flex items-center gap-2 shadow-sm transition-colors"><Icon name="Plus" size={16} /> 新規登録</button>
                        </div>
                    </div>
                    <Card className="overflow-hidden shadow-sm">
                        <div className="overflow-x-auto pb-4">
                            <table className="w-full text-sm text-left whitespace-nowrap">
                                <thead className="bg-slate-50 border-b text-slate-500 font-semibold text-xs uppercase tracking-wider">
                                    <tr>
                                        <th className="px-3 py-3 cursor-pointer hover:bg-slate-100 transition-colors" onClick={() => handleSort('name')}><div className="flex items-center gap-1">名前 <SortIcon column="name" /></div></th>
                                        <th className="px-2 py-3 cursor-pointer hover:bg-slate-100 transition-colors" onClick={() => handleSort('status')}><div className="flex items-center gap-1">ステータス <SortIcon column="status" /></div></th>
                                        <th className="px-2 py-3">担当</th>
                                        <th className="px-2 py-3 text-right cursor-pointer hover:bg-slate-100 transition-colors" onClick={() => handleSort('spend')}><div className="flex items-center justify-end gap-1"><SortIcon column="spend" />消化 / 予算</div></th>
                                        <th className="px-2 py-3 text-right cursor-pointer hover:bg-slate-100 transition-colors" onClick={() => handleSort('cpa')}><div className="flex items-center justify-end gap-1"><SortIcon column="cpa" />CPA</div></th>
                                        <th className="px-2 py-3 text-right">目標/限界CPA</th>
                                        <th className="px-2 py-3 text-right cursor-pointer hover:bg-slate-100 transition-colors" onClick={() => handleSort('impressions')}><div className="flex items-center justify-end gap-1"><SortIcon column="impressions" />インプレッション</div></th>
                                        <th className="px-2 py-3 text-right cursor-pointer hover:bg-slate-100 transition-colors" onClick={() => handleSort('clicks')}><div className="flex items-center justify-end gap-1"><SortIcon column="clicks" />クリック</div></th>
                                        <th className="px-2 py-3 text-right cursor-pointer hover:bg-slate-100 transition-colors" onClick={() => handleSort('ctr')}><div className="flex items-center justify-end gap-1"><SortIcon column="ctr" />CTR</div></th>
                                        <th className="px-3 py-3 text-right cursor-pointer hover:bg-slate-100 transition-colors" onClick={() => handleSort('cvs')}><div className="flex items-center justify-end gap-1"><SortIcon column="cvs" />結果 (推移)</div></th>
                                        <th className="px-3 py-3 text-center">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {processed.map(client => {
                                        const spendRatio = client.budget > 0 ? (client.spend / client.budget) * 100 : 0;
                                        return (
                                            <tr key={client.id} onClick={() => onSelectClient(client)} className={`border-b border-slate-100 hover:bg-slate-50/80 transition-all cursor-pointer ${menuOpen === client.id ? "bg-slate-50 relative z-20" : "relative z-0"}`}>
                                                <td className="px-3 py-4 font-medium align-middle">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-9 h-9 rounded-md bg-white text-primary flex items-center justify-center text-sm font-bold shadow-sm border border-slate-200">{client.name.charAt(0)}</div>
                                                        <div>
                                                            <div className="text-slate-900 text-sm">{client.name}</div>
                                                            <div className="text-[11px] text-slate-400 font-normal mt-0.5">{client.adAccountId}</div>
                                                        </div>
                                                    </div>
                                                </td>
                                                <td className="px-2 py-4 align-middle">
                                                    <div className="group relative inline-block">
                                                        {client.status === 'active' && <Badge variant="active">配信中</Badge>}
                                                        {client.status === 'alert' && <Badge variant="alert" className="cursor-help">アラート</Badge>}
                                                        {client.status === 'paused' && <Badge variant="paused">停止中</Badge>}
                                                        {client.status === 'rejected' && <Badge variant="rejected">審査エラー</Badge>}
                                                        {client.status === 'alert' && client.alertReason && (
                                                            <div className="absolute left-1/2 -translate-x-1/2 bottom-full mb-2 hidden group-hover:block w-max max-w-[220px] bg-slate-800 text-white text-xs rounded-md shadow-lg py-2 px-3 z-[100] whitespace-normal">
                                                                <div className="flex items-start gap-2">
                                                                    <Icon name="AlertCircle" size={14} className="text-red-400 shrink-0 mt-0.5" />
                                                                    <span>{client.alertReason}</span>
                                                                </div>
                                                                <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-800"></div>
                                                            </div>
                                                        )}
                                                    </div>
                                                </td>
                                                <td className="px-2 py-4 text-slate-500 font-medium align-middle text-xs">{client.assignee || <span className="text-slate-400 font-normal">未設定</span>}</td>
                                                <td className="px-2 py-4 text-right align-middle">
                                                    <div className="font-bold text-slate-900 text-sm tracking-tight">{formatCurrency(client.spend)}</div>
                                                    <div className="text-[11px] text-slate-400 mt-1">/ {formatCurrency(client.budget)}</div>
                                                    <div className="w-full bg-slate-100 rounded-full h-1.5 mt-1.5 overflow-hidden shadow-inner">
                                                        <div className={`h-full rounded-full transition-all duration-700 ease-out ${spendRatio > 100 ? 'bg-red-500' : 'bg-primary'}`} style={{ width: `${Math.min(spendRatio, 100)}%` }}></div>
                                                    </div>
                                                    <div className="flex justify-between items-center mt-0.5">
                                                        <CompBadge cur={client.spend} prev={client.prevSpend} reverseColor={true} />
                                                        <span className="text-[10px] text-slate-400 font-semibold">{spendRatio.toFixed(1)}%</span>
                                                    </div>
                                                </td>
                                                <td className="px-2 py-4 text-right align-middle whitespace-nowrap">
                                                    <div className={`font-bold text-base tracking-tight ${client.cpa > client.limitCpa && client.limitCpa > 0 ? "text-red-600" : "text-slate-900"}`}>{formatCurrency(client.cpa)}</div>
                                                    <CompBadge cur={client.cpa} prev={client.prevCvs > 0 ? client.prevSpend / client.prevCvs : 0} reverseColor={true} />
                                                </td>
                                                <td className="px-2 py-4 text-right align-middle whitespace-nowrap">
                                                    <div className="flex flex-col gap-1.5 items-end pl-2">
                                                        {['targetCpa', 'limitCpa'].map(field => {
                                                            const isEditing = editingInput.id === client.id && editingInput.field === field;
                                                            return isEditing ? (
                                                                <div key={field} onClick={(e) => e.stopPropagation()} className="flex items-center gap-1.5">
                                                                    <span className="text-[10px] text-slate-400 w-6 text-left">{field === 'targetCpa' ? '目標' : '限界'}</span>
                                                                    <input autoFocus type="number" className="w-24 px-2 py-0.5 text-xs text-right border border-primary focus:ring-2 focus:ring-primary/20 rounded shadow-sm outline-none font-medium" value={editingInput.value} onChange={e => setEditingInput({ ...editingInput, value: e.target.value })} onBlur={() => handleSaveEdit(client, field)} onKeyDown={e => e.key === 'Enter' && handleSaveEdit(client, field)} />
                                                                </div>
                                                            ) : (
                                                                <div key={field} className="flex items-center justify-end gap-1.5 group cursor-pointer hover:bg-slate-100 p-0.5 -m-0.5 rounded transition-colors" onClick={(e) => { e.stopPropagation(); setEditingInput({ id: client.id, field, value: client[field] }) }}>
                                                                    <span className="text-[10px] text-slate-400 w-6 text-left">{field === 'targetCpa' ? '目標' : '限界'}</span>
                                                                    <span className="text-slate-700 font-semibold text-xs tracking-tight">{client[field] > 0 ? formatCurrency(client[field]) : '-'}</span>
                                                                    <Icon name="Edit2" size={10} className="text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity" />
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </td>
                                                <td className="px-2 py-4 text-right align-middle whitespace-nowrap">
                                                    <div className="font-bold text-slate-900 text-sm tracking-tight">{formatNumber(client.impressions)}</div>
                                                </td>
                                                <td className="px-2 py-4 text-right align-middle whitespace-nowrap">
                                                    <div className="font-bold text-slate-900 text-sm tracking-tight">{formatNumber(client.clicks)}</div>
                                                </td>
                                                <td className="px-2 py-4 text-right align-middle">
                                                    <div className="font-bold text-slate-700 text-sm mix-blend-multiply">{formatPercent(client.ctr)}</div>
                                                </td>
                                                <td className="px-3 py-4 text-right align-middle">
                                                    <div className="flex items-center justify-end gap-2 min-w-[90px]">
                                                        <div className="flex flex-col items-end">
                                                            <div className="font-bold text-slate-900 text-lg tracking-tight">{formatNumber(client.cvs || 0)}</div>
                                                            <CompBadge cur={client.cvs || 0} prev={client.prevCvs || 0} />
                                                        </div>
                                                        <div className="w-16 hidden lg:block opacity-80 hover:opacity-100 transition-opacity"><Sparkline data={client.historyCvs} color={client.cvs >= (client.prevCvs || 0) ? "#10b981" : "#ef4444"} /></div>
                                                    </div>
                                                </td>
                                                <td className="px-3 py-4 text-center align-middle relative">
                                                    <div className="flex items-center justify-center">
                                                        <button onClick={(e) => { e.stopPropagation(); setMenuOpen(menuOpen === client.id ? null : client.id) }} className={`p-1.5 rounded transition-colors relative z-10 ${menuOpen === client.id ? "bg-slate-200 text-slate-800 shadow-inner" : "text-slate-400 hover:text-slate-600 hover:bg-slate-100"}`}><Icon name="MoreHorizontal" size={16} /></button>
                                                    </div>
                                                    {menuOpen === client.id && (
                                                        <div className="absolute right-6 top-12 w-48 bg-white border border-slate-200 rounded-md shadow-[0_4px_20px_-4px_rgba(0,0,0,0.1)] z-50 py-1.5 text-left animate-in fade-in zoom-in-95 duration-100">
                                                            <div className="px-3 py-1.5 text-[10px] font-semibold text-slate-400 uppercase tracking-wider border-b border-slate-100 mb-1">アクション</div>
                                                            <button onClick={(e) => e.stopPropagation()} className="w-full px-4 py-2 text-xs font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-50 flex items-center gap-2.5 transition-colors"><Icon name="FileBarChart" size={14} className="text-slate-400" /> レポート出力</button>
                                                            <button onClick={(e) => e.stopPropagation()} className="w-full px-4 py-2 text-xs font-medium text-amber-600 hover:text-amber-700 hover:bg-amber-50 flex items-center gap-2.5 transition-colors"><Icon name="PauseCircle" size={14} className="text-amber-500" /> 配信一時停止</button>
                                                        </div>
                                                    )}
                                                </td>
                                            </tr>
                                        )
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </Card>
                </div>
            )
        };

        const HISTORY_MENU = {
            "広告設定": ["予算調整", "ターゲティング変更", "オーディエンス追加", "配信ステータス変更", "入札戦略変更", "その他"],
            "クリエイティブ": ["画像/動画の追加", "メインテキスト変更", "見出し変更", "画像/動画の差し替え・停止", "その他"],
            "リンク先": ["遷移先URL変更", "UTMパラメータ追加・変更", "遷移先停止/差し替え", "その他"]
        };

        const DashboardDetail = ({ role, client, onBack, onUpdateClient, onDeleteClient, onFetchMetaAds, isFetchingMeta, teamMembers }) => {
            const [expandedRows, setExpandedRows] = useState(new Set([]));
            const [activeTab, setActiveTab] = useState("dashboard");
            const [activeInfoTab, setActiveInfoTab] = useState("basic");
            const [dateRange, setDateRange] = useState("this_month");
            const [customStartDate, setCustomStartDate] = useState(() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; });
            const [customEndDate, setCustomEndDate] = useState(() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; });
            const [previewMedia, setPreviewMedia] = useState(null);

            const data = useMemo(() => {
                const now = new Date();
                let startDate = new Date();
                let endDate = new Date();
                
                if (dateRange === 'this_month') {
                    startDate = new Date(now.getFullYear(), now.getMonth(), 1);
                    endDate = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59);
                } else if (dateRange === 'last_month') {
                    startDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                    endDate = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59);
                } else if (dateRange === 'last_7') {
                    startDate = new Date();
                    startDate.setDate(now.getDate() - 7);
                    startDate.setHours(0, 0, 0, 0);
                } else if (dateRange === 'today') {
                    startDate = new Date();
                    startDate.setHours(0, 0, 0, 0);
                    endDate = new Date();
                    endDate.setHours(23, 59, 59, 999);
                } else if (dateRange === 'yesterday') {
                    startDate = new Date();
                    startDate.setDate(now.getDate() - 1);
                    startDate.setHours(0, 0, 0, 0);
                    endDate = new Date(startDate);
                    endDate.setHours(23, 59, 59, 999);
                } else if (dateRange === 'custom') {
                    startDate = new Date(customStartDate);
                    startDate.setHours(0, 0, 0, 0);
                    endDate = new Date(customEndDate);
                    endDate.setHours(23, 59, 59, 999);
                }

                const validMetrics = (client.rawMetrics || []).filter(m => {
                    const d = new Date(m.fetched_date || m.created_at || Date.now());
                    return d >= startDate && d <= endDate;
                });

                const hierarchy = {};

                validMetrics.forEach(m => {
                    const cName = m.campaign_name || "未分類キャンペーン";
                    const sName = m.adset_name || "未分類広告セット";
                    const aName = m.ad_name || "未分類広告";

                    const spend = parseFloat(m.spend) || 0;
                    const imp = parseInt(m.impressions) || 0;
                    const clicks = parseInt(m.clicks) || 0;
                    const cvs = parseFloat(m.conversions) || 0;

                    if (!hierarchy[cName]) hierarchy[cName] = { spend: 0, imp: 0, clicks: 0, cvs: 0, adsets: {} };
                    hierarchy[cName].spend += spend;
                    hierarchy[cName].imp += imp;
                    hierarchy[cName].clicks += clicks;
                    hierarchy[cName].cvs += cvs;

                    if (!hierarchy[cName].adsets[sName]) hierarchy[cName].adsets[sName] = { spend: 0, imp: 0, clicks: 0, cvs: 0, ads: {} };
                    hierarchy[cName].adsets[sName].spend += spend;
                    hierarchy[cName].adsets[sName].imp += imp;
                    hierarchy[cName].adsets[sName].clicks += clicks;
                    hierarchy[cName].adsets[sName].cvs += cvs;

                    if (!hierarchy[cName].adsets[sName].ads[aName]) {
                        hierarchy[cName].adsets[sName].ads[aName] = { 
                            spend: 0, 
                            imp: 0, 
                            clicks: 0, 
                            cvs: 0,
                            image_url: m.image_url || null,
                            link_url: m.link_url || null,
                            video_url: m.video_url || null
                        };
                    }
                    hierarchy[cName].adsets[sName].ads[aName].spend += spend;
                    hierarchy[cName].adsets[sName].ads[aName].imp += imp;
                    hierarchy[cName].adsets[sName].ads[aName].clicks += clicks;
                    hierarchy[cName].adsets[sName].ads[aName].cvs += cvs;
                    if (m.image_url) hierarchy[cName].adsets[sName].ads[aName].image_url = m.image_url;
                    if (m.link_url) hierarchy[cName].adsets[sName].ads[aName].link_url = m.link_url;
                    if (m.video_url) hierarchy[cName].adsets[sName].ads[aName].video_url = m.video_url;
                });

                const campaignsNodes = Object.keys(hierarchy).map((cName, cIdx) => {
                    const cData = hierarchy[cName];
                    const adsetsNodes = Object.keys(cData.adsets).map((sName, sIdx) => {
                        const sData = cData.adsets[sName];
                        const adsNodes = Object.keys(sData.ads).map((aName, aIdx) => {
                            const aData = sData.ads[aName];

                            const urlNode = {
                                id: `url-${cIdx}-${sIdx}-${aIdx}`,
                                name: aData.link_url ? aData.link_url : 'リンク先URLが取得できません',
                                level: 4,
                                isUrlNode: true,
                                link_url: aData.link_url
                            };

                            return {
                                id: `ad-${cIdx}-${sIdx}-${aIdx}`,
                                name: aName,
                                level: 3,
                                status: aData.spend > 0 ? 'active' : 'paused',
                                spend: aData.spend,
                                impressions: aData.imp,
                                clicks: aData.clicks,
                                cvs: aData.cvs,
                                image_url: aData.image_url,
                                link_url: aData.link_url,
                                video_url: aData.video_url,
                                children: [urlNode]
                            };
                        });
                        return {
                            id: `adset-${cIdx}-${sIdx}`,
                            name: sName,
                            level: 2,
                            status: sData.spend > 0 ? 'active' : 'paused',
                            spend: sData.spend,
                            impressions: sData.imp,
                            clicks: sData.clicks,
                            cvs: sData.cvs,
                            children: adsNodes
                        };
                    });
                    return {
                        id: `campaign-${cIdx}`,
                        name: cName,
                        level: 1,
                        status: cData.spend > 0 ? 'active' : 'paused',
                        spend: cData.spend,
                        impressions: cData.imp,
                        clicks: cData.clicks,
                        cvs: cData.cvs,
                        children: adsetsNodes
                    };
                });

                const totalSpend = validMetrics.reduce((sum, m) => sum + (parseFloat(m.spend) || 0), 0);
                const totalImpressions = validMetrics.reduce((sum, m) => sum + (parseInt(m.impressions) || 0), 0);
                const totalClicks = validMetrics.reduce((sum, m) => sum + (parseInt(m.clicks) || 0), 0);
                const totalCvs = validMetrics.reduce((sum, m) => sum + (parseFloat(m.conversions) || 0), 0);

                return [
                    {
                        id: 'overall',
                        name: 'アカウント全体実績',
                        level: 0,
                        status: client.status,
                        spend: totalSpend,
                        impressions: totalImpressions,
                        clicks: totalClicks,
                        cvs: totalCvs,
                        children: campaignsNodes
                    }
                ];
            }, [client.rawMetrics, client.status, dateRange, customStartDate, customEndDate]);

            // Supabase states
            const [dbHistoryLogs, setDbHistoryLogs] = useState([]);
            const [dbMinutesLogs, setDbMinutesLogs] = useState([]);

            useEffect(() => {
                const loadDetails = async () => {
                    if (!supabase) return;
                    try {
                        // ad_metrics (if you want to fetch and replace data here)
                        // const resAd = await supabase.from('ad_metrics').select('*').eq('client_id', client.id);

                        // change_logs
                        const resLogs = await supabase.from('change_logs').select('*').eq('client_id', client.id).order('action_date', { ascending: false });
                        if (resLogs.data) {
                            setDbHistoryLogs(resLogs.data.map(d => ({
                                id: d.id,
                                date: d.action_date,
                                user: d.assignee || '不明',
                                action: `${d.category_main}: ${d.category_sub}`,
                                detail: d.memo,
                                before: d.value_before,
                                after: d.value_after
                            })));
                        }

                        // meeting_notes
                        const resNotes = await supabase.from('meeting_notes').select('*').eq('client_id', client.id).order('meeting_date', { ascending: false });
                        if (resNotes.data) {
                            setDbMinutesLogs(resNotes.data.map(d => ({
                                id: d.id,
                                date: d.meeting_date,
                                user: '不明', // Or add assignee to table
                                title: d.title,
                                detail: d.summary,
                                url: d.url
                            })));
                        }
                    } catch (e) { console.error('Error loading details', e); }
                };
                loadDetails();
            }, [client.id]);

            // Header inline editing
            const [editingHeaderField, setEditingHeaderField] = useState(null);
            const [headerTempVal, setHeaderTempVal] = useState("");

            const startEditingHeader = (field, val) => {
                setEditingHeaderField(field);
                setHeaderTempVal(val);
            };

            const saveEditingHeader = () => {
                if (editingHeaderField) {
                    const isNum = ['budget', 'targetCpa', 'limitCpa'].includes(editingHeaderField);
                    onUpdateClient({
                        ...client,
                        [editingHeaderField]: isNum ? Number(headerTempVal) : headerTempVal
                    });
                }
                setEditingHeaderField(null);
            };


            // Dummy History state
            const [historyLogs, setHistoryLogs] = useState([
                { id: 1, date: "2026-03-26", user: "運用担当者", action: "広告設定: 予算調整", detail: "消化好調につき、リターゲティングの1日あたりの予算を増額。", before: "￥10,000/日", after: "￥15,000/日" },
                { id: 2, date: "2026-03-24", user: "制作部", action: "クリエイティブ: 画像/動画の追加", detail: "春季キャンペーン用のスライダーバナーを3点入稿し、既存の古いバナーを停止。", before: "", after: "" },
            ]);
            const [logCategory, setLogCategory] = useState("広告設定");
            const [logSubCategory, setLogSubCategory] = useState(HISTORY_MENU["広告設定"][0]);
            const [logUser, setLogUser] = useState("運用担当者");
            const [logBefore, setLogBefore] = useState("");
            const [logAfter, setLogAfter] = useState("");
            const [newLog, setNewLog] = useState("");

            // Filter states for History Tab
            const [historyFilterDate, setHistoryFilterDate] = useState("all");
            const [historyFilterMainCat, setHistoryFilterMainCat] = useState("all");
            const [historyFilterSubCat, setHistoryFilterSubCat] = useState("all");

            useEffect(() => {
                setLogSubCategory(HISTORY_MENU[logCategory][0]);
            }, [logCategory]);

            useEffect(() => {
                setHistoryFilterSubCat("all"); // Reset sub category when main category changes
            }, [historyFilterMainCat]);

            // Minutes State
            const getTodayStr = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; };
            const [minutesLogs, setMinutesLogs] = useState([
                { id: 1, date: "2026-03-25", user: "運用担当: 佐藤", title: "4月度キャンペーン定例ミーティング", detail: "・4月15日からの春季キャンペーンについてすり合わせ\n・予算は現状維持だが、リターゲティンクの比率を現状の10%から20%へ増やす方向\n・新規クリエイティブは来週水曜までにクライアント側からURL（Drive）にて連携予定\n\n【Next Action】\n佐藤: 水曜に素材受領後、即日入稿\nクライアント様: 素材URLの手配", url: "" }
            ]);
            const [newMinuteDate, setNewMinuteDate] = useState(getTodayStr());
            const [newMinuteTitle, setNewMinuteTitle] = useState("");
            const [newMinuteUrl, setNewMinuteUrl] = useState("");
            const [newMinuteText, setNewMinuteText] = useState("");

            // Info State
            const [clientInfo, setClientInfo] = useState({
                // Contacts
                representativeName: client.representativeName || "",
                companyName: client.name || "",
                clientContactName: client.clientContactName || "",
                viewPassword: client.viewPassword || "",
                // Contracts
                metaAdPlan: client.metaPlan || "",
                googleAdPlan: client.googlePlan || "",
                lpCreator: client.lpVendor || "",
                contractNotes: client.specialNotes || "",
                // Business and Service
                businessDetails: client.businessDetails || "",
                serviceDetails: client.serviceDetails || "",
                initialHearing: client.hearingNotes || "",
                services: client.mainServices || "",
                
                // Ads
                metaAdAccountId: client.metaAdAccountId || "",
                pixelId: client.pixelId || "",
                metaFacebookPage: client.metaFbPage || "",
                metaInstagramAccount: client.metaIgAccount || "",
                googleAdAccountId: client.googleCustomerId || "",
                googleClientGmail: client.googleClientGmail || "",
                // KPIs
                metaTargetConversions: client.metaTargetCv || "",
                metaTargetCpa: client.metaTargetCpa || "",
                metaLimitCpa: client.metaLimitCpa || "",
                googleTargetConversions: client.googleTargetCv || "",
                googleTargetCpa: client.googleTargetCpa || "",
                googleLimitCpa: client.googleLimitCpa || "",
                
                // Creative
                assetGooglePhoto: client.urlGooglePhoto || "",
                assetGoogleDrive: client.urlDrive || "",
                assetDropbox: client.urlDropbox || "",
                assetOther: client.urlOtherStorage || "",
                creativeStorageUrl: client.urlCreativeFolder || "",
                
                // Links - Web
                lpUrl1: client.urlLp1 || "",
                lpUrl2: client.urlLp2 || "",
                lpUrl3: client.urlLp3 || "",
                websiteUrl1: client.urlWeb1 || "",
                websiteUrl2: client.urlWeb2 || "",
                websiteUrl3: client.urlWeb3 || "",
                // Links - Portal
                hotpepperUrl: client.urlHotpepper || "",
                // Links - SNS
                instagramUrl: client.urlInstagram || "",
                lineUrl: client.urlLine || "",
                tiktokUrl: client.urlTiktok || "",
                xUrl: client.urlX || "",
                youtubeUrl: client.urlYoutube || ""
            });
            const [editingInfoField, setEditingInfoField] = useState(null);

            const handleInfoSave = () => {
                setEditingInfoField(null);
                onUpdateClient({ ...client, info: clientInfo });
            };
            const handleAddLog = async (e) => {
                e.preventDefault();
                const now = new Date();
                const d = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                
                const logEntry = {
                    client_id: client.id,
                    action_date: d,
                    assignee: logUser,
                    category_main: logCategory,
                    category_sub: logSubCategory,
                    value_before: logBefore,
                    value_after: logAfter,
                    memo: newLog || "(メモなし)"
                };
                
                if (supabase && !("" + client.id).startsWith("cl")) {
                    try {
                        const { data, error } = await supabase.from('change_logs').insert([logEntry]).select('*');
                        if (error) throw error;
                        if (data && data.length > 0) {
                            const dRecord = data[0];
                            setDbHistoryLogs([{
                                id: dRecord.id,
                                date: dRecord.action_date,
                                user: dRecord.assignee || '不明',
                                action: `${dRecord.category_main}: ${dRecord.category_sub}`,
                                detail: dRecord.memo,
                                before: dRecord.value_before,
                                after: dRecord.value_after
                            }, ...dbHistoryLogs]);
                        }
                    } catch(err) {
                        console.error("Error saving log", err);
                    }
                } else {
                    setHistoryLogs([{ id: Date.now(), date: d, user: logUser, action: `${logCategory}: ${logSubCategory}`, detail: newLog || "(メモなし)", before: logBefore, after: logAfter }, ...historyLogs]);
                }
                
                setNewLog("");
                setLogBefore("");
                setLogAfter("");
            };

            const handleAddMinute = async (e) => {
                e.preventDefault();
                if (!newMinuteTitle || !newMinuteDate || !newMinuteText) return;
                
                const noteEntry = {
                    client_id: client.id,
                    meeting_date: newMinuteDate,
                    title: newMinuteTitle,
                    url: newMinuteUrl,
                    summary: newMinuteText
                };
                
                if (supabase && !("" + client.id).startsWith("cl")) {
                    try {
                        const { data, error } = await supabase.from('meeting_notes').insert([noteEntry]).select('*');
                        if (error) throw error;
                        if (data && data.length > 0) {
                            const nRecord = data[0];
                            setDbMinutesLogs([{
                                id: nRecord.id,
                                date: nRecord.meeting_date,
                                user: 'ログインユーザー',
                                title: nRecord.title,
                                detail: nRecord.summary,
                                url: nRecord.url
                            }, ...dbMinutesLogs]);
                        }
                    } catch(err) {
                        console.error("Error saving minute", err);
                    }
                } else {
                    setMinutesLogs([{ id: Date.now(), date: newMinuteDate, user: "ログインユーザー", title: newMinuteTitle, detail: newMinuteText, url: newMinuteUrl }, ...minutesLogs]);
                }

                setNewMinuteDate(getTodayStr());
                setNewMinuteTitle("");
                setNewMinuteText("");
                setNewMinuteUrl("");
            };

            const [editHistoryId, setEditHistoryId] = useState(null);
            const [editHistoryForm, setEditHistoryForm] = useState(null);
            const handleDeleteHistory = async (id) => {
                if (window.confirm('この履歴を削除しますか？')) {
                    if (supabase && !("" + client.id).startsWith("cl")) {
                        try {
                            const { error } = await supabase.from('change_logs').delete().eq('id', id);
                            if (error) throw error;
                            setDbHistoryLogs(prev => prev.filter(l => l.id !== id));
                        } catch (e) {
                            console.error("Error deleting log", e);
                            alert("削除に失敗しました。");
                        }
                    } else {
                        setHistoryLogs(prev => prev.filter(l => l.id !== id));
                    }
                }
            };
            const handleSaveHistory = async () => {
                if (supabase && !("" + client.id).startsWith("cl")) {
                    try {
                        const { error } = await supabase.from('change_logs').update({
                            value_before: editHistoryForm.before,
                            value_after: editHistoryForm.after,
                            memo: editHistoryForm.detail
                        }).eq('id', editHistoryForm.id);
                        if (error) throw error;
                        setDbHistoryLogs(prev => prev.map(l => l.id === editHistoryForm.id ? editHistoryForm : l));
                    } catch (e) {
                        console.error("Error updating log", e);
                        alert("保存に失敗しました。");
                    }
                } else {
                    setHistoryLogs(prev => prev.map(l => l.id === editHistoryForm.id ? editHistoryForm : l));
                }
                setEditHistoryId(null);
            };

            const [editMinuteId, setEditMinuteId] = useState(null);
            const [editMinuteForm, setEditMinuteForm] = useState(null);
            const handleDeleteMinute = async (id) => {
                if (window.confirm('この議事録を削除しますか？')) {
                    if (supabase && !("" + client.id).startsWith("cl")) {
                        try {
                            const { error } = await supabase.from('meeting_notes').delete().eq('id', id);
                            if (error) throw error;
                            setDbMinutesLogs(prev => prev.filter(l => l.id !== id));
                        } catch (e) {
                            console.error("Error deleting minute", e);
                            alert("削除に失敗しました。");
                        }
                    } else {
                        setMinutesLogs(prev => prev.filter(l => l.id !== id));
                    }
                }
            };
            const handleSaveMinute = async () => {
                if (supabase && !("" + client.id).startsWith("cl")) {
                    try {
                        const { error } = await supabase.from('meeting_notes').update({
                            meeting_date: editMinuteForm.date,
                            title: editMinuteForm.title,
                            url: editMinuteForm.url,
                            summary: editMinuteForm.detail
                        }).eq('id', editMinuteForm.id);
                        if (error) throw error;
                        setDbMinutesLogs(prev => prev.map(l => l.id === editMinuteForm.id ? editMinuteForm : l));
                    } catch (e) {
                        console.error("Error updating minute", e);
                        alert("保存に失敗しました。");
                    }
                } else {
                    setMinutesLogs(prev => prev.map(l => l.id === editMinuteForm.id ? editMinuteForm : l));
                }
                setEditMinuteId(null);
            };

            const toggleExpand = (id) => {
                const newSet = new Set(expandedRows);
                newSet.has(id) ? newSet.delete(id) : newSet.add(id);
                setExpandedRows(newSet);
            };

            const renderRows = (items) => {
                let rows = [];
                items.forEach(item => {
                    if (item.isUrlNode) {
                        rows.push(
                            <tr key={item.id} className="bg-slate-50/80 border-b border-slate-100">
                                <td colSpan="11" className="p-3 pl-28 align-middle">
                                    <div className="flex items-center gap-2 text-xs text-slate-600 font-mono bg-white border border-slate-200 px-3 py-2 rounded-md shadow-sm w-fit max-w-full overflow-hidden">
                                        <Icon name="Link" size={14} className="text-blue-500 shrink-0" />
                                        <span className="truncate select-all">{item.name}</span>
                                        {item.link_url && (
                                            <a href={item.link_url} target="_blank" rel="noopener noreferrer" className="ml-2 text-blue-600 hover:text-blue-800 shrink-0 hover:scale-110 transition-transform">
                                                <Icon name="ExternalLink" size={14} />
                                            </a>
                                        )}
                                    </div>
                                </td>
                            </tr>
                        );
                        return;
                    }

                    const isExpanded = expandedRows.has(item.id);
                    const hasChildren = item.children && item.children.length > 0;
                    const indentClass = item.level === 0 ? "pl-4" : item.level === 1 ? "pl-10" : item.level === 2 ? "pl-16" : "pl-20";
                    const rowBgClass = item.level === 0 ? "bg-white hover:bg-slate-50/80" : item.level === 1 ? "bg-slate-50/50 hover:bg-slate-100/50" : item.level === 2 ? "bg-slate-50 hover:bg-slate-100/60" : "bg-white hover:bg-slate-50";

                    const cvs = parseFloat(item.cvs) || 0;
                    const impressions = parseInt(item.impressions) || 0;
                    const clicks = parseInt(item.clicks) || 0;
                    const spend = parseFloat(item.spend) || 0;
                    
                    const cpa = cvs > 0 ? spend / cvs : 0;
                    const cpm = impressions > 0 ? (spend / impressions) * 1000 : 0;
                    const cpc = clicks > 0 ? spend / clicks : 0;
                    const ctr = impressions > 0 ? (clicks / impressions) * 100 : 0;
                    const freq = item.level === 0 ? 1.8 : item.level === 1 ? 1.5 : 1.2;

                    rows.push(
                        <tr key={item.id} className={`border-b border-border transition-colors cursor-pointer ${rowBgClass}`} onClick={() => hasChildren && toggleExpand(item.id)}>
                            <td className={`p-3 align-middle font-medium max-w-[200px] sm:max-w-[300px] md:max-w-[400px] lg:max-w-[500px] ${indentClass}`}>
                                <div className="flex items-center gap-2 w-full">
                                    {hasChildren ? (
                                        <button className="p-1 rounded-md hover:bg-slate-200 transition-colors text-slate-500 shrink-0">
                                            <Icon name="ChevronRight" size={16} className={`transition-transform duration-200 ${isExpanded ? "rotate-90" : ""}`} />
                                        </button>
                                    ) : (
                                        <span className="w-6 flex justify-center text-slate-300 shrink-0"><Icon name="Minus" size={16} /></span>
                                    )}
                                    {item.level === 3 && item.image_url ? (
                                        <img src={item.image_url} onClick={(e) => { e.stopPropagation(); setPreviewMedia({ type: item.video_url ? 'video' : 'image', url: item.video_url || item.image_url, linkUrl: item.link_url }); }} className="w-8 h-8 rounded border border-slate-200 object-cover shrink-0 cursor-pointer hover:opacity-80 transition-opacity" alt="ad preview" />
                                    ) : (
                                        <Icon name={item.level === 0 ? 'Layers' : item.level === 1 ? 'Folder' : item.level === 2 ? 'FolderOpen' : 'LayoutTemplate'} size={14} className="text-indigo-400 shrink-0" />
                                    )}
                                    <span title={item.name} className={`truncate block ${item.level === 0 ? 'text-slate-900 font-bold' : 'text-slate-700'}`}>{item.name}</span>
                                    {item.level === 3 && item.link_url && (
                                        <a href={item.link_url} target="_blank" onClick={(e) => e.stopPropagation()} className="text-blue-500 hover:text-blue-700 ml-1 shrink-0 flex items-center">
                                            <Icon name="ExternalLink" size={14} />
                                        </a>
                                    )}
                                </div>
                            </td>
                            <td className="p-3 align-middle">{item.status === 'active' ? <Badge variant="active">配信中</Badge> : <Badge variant="paused">停止中</Badge>}</td>
                            <td className="p-3 align-middle text-right font-medium">{formatCurrency(spend)}</td>
                            <td className="p-3 align-middle text-right font-bold">{formatNumber(cvs)}</td>
                            <td className="p-3 align-middle text-right">{cpa > 0 ? formatCurrency(Math.floor(cpa)) : "-"}</td>
                            <td className="p-3 align-middle text-right">{formatNumber(impressions)}</td>
                            <td className="p-3 align-middle text-right">{formatCurrency(Math.floor(cpm))}</td>
                            <td className="p-3 align-middle text-right">{formatNumber(clicks)}</td>
                            <td className="p-3 align-middle text-right">{formatDecimal(freq)}</td>
                            <td className="p-3 align-middle text-right">{formatCurrency(Math.floor(cpc))}</td>
                            <td className="p-3 align-middle text-right">{formatPercent(ctr)}</td>
                        </tr>
                    );
                    if (isExpanded && item.children) rows = rows.concat(renderRows(item.children));
                });
                return rows;
            };

            const isCpaHigh = client.cpa >= client.limitCpa && client.limitCpa > 0;

            return (
                <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500 pb-20">
                    {role !== 'client' && (
                        <button onClick={onBack} className="text-sm font-medium text-slate-500 hover:text-slate-900 flex items-center transition-colors">
                            <Icon name="ArrowLeft" size={16} className="mr-1" /> クライアント一覧に戻る
                        </button>
                    )}

                    <header className="mb-2 flex flex-col md:flex-row md:items-end justify-between gap-4">
                        <div>
                            <div className="flex items-center gap-3 mb-3 group">
                                <div className="w-10 h-10 rounded bg-primary text-primary-foreground flex items-center justify-center font-bold text-lg shadow-sm">
                                    {client.name.charAt(0)}
                                </div>
                                {editingHeaderField === 'name' ? (
                                    <input
                                        autoFocus
                                        type="text"
                                        value={headerTempVal}
                                        onChange={e => setHeaderTempVal(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && saveEditingHeader()}
                                        onBlur={saveEditingHeader}
                                        className="text-2xl font-bold tracking-tight text-slate-900 bg-white border border-primary px-2 py-0.5 rounded outline-none w-64 focus:ring-2 focus:ring-primary/20"
                                    />
                                ) : (
                                    <div className={`flex items-center gap-2 ${role !== 'client' ? 'cursor-pointer' : ''}`} onClick={() => role !== 'client' && startEditingHeader('name', client.name)}>
                                        <h2 className="text-2xl font-bold tracking-tight text-slate-900">{client.name}</h2>
                                        {role !== 'client' && <Icon name="Edit3" size={16} className="text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity hover:text-primary" />}
                                    </div>
                                )}
                            </div>
                            <div className="flex flex-wrap gap-x-6 gap-y-2 text-sm text-slate-600 bg-white p-3 rounded-lg border border-slate-200 shadow-sm w-fit">
                                {['assignee', 'budget', 'targetCpa', 'limitCpa'].map(field => {
                                    const labels = { assignee: '運用担当者', budget: '予算', targetCpa: '目標CPA', limitCpa: '限界CPA' };
                                    const icons = { assignee: 'User', budget: 'Wallet', targetCpa: 'Target', limitCpa: 'AlertTriangle' };
                                    const isNumeric = field !== 'assignee';
                                    return (
                                        <div key={field} className={`flex items-center gap-1.5 group ${role !== 'client' ? 'cursor-pointer' : ''}`} onClick={() => role !== 'client' && startEditingHeader(field, client[field] || '')}>
                                            <Icon name={icons[field]} size={14} className="text-slate-400" />
                                            <span className="text-slate-500">{labels[field]}:</span>
                                            {editingHeaderField === field ? (
                                                field === 'assignee' ? (
                                                    <select
                                                        autoFocus
                                                        value={headerTempVal}
                                                        onChange={e => {
                                                            const val = e.target.value;
                                                            setHeaderTempVal(val);
                                                            onUpdateClient({ ...client, [field]: val });
                                                            setEditingHeaderField(null);
                                                        }}
                                                        onBlur={() => setEditingHeaderField(null)}
                                                        className="w-32 px-1 py-0.5 text-xs font-semibold border border-primary outline-none focus:ring-2 focus:ring-primary/20 rounded bg-white"
                                                    >
                                                        <option value="">未設定</option>
                                                        {teamMembers && teamMembers.map(member => (
                                                            <option key={member.name} value={member.name}>{member.name}</option>
                                                        ))}
                                                    </select>
                                                ) : (
                                                    <input
                                                        autoFocus
                                                        type={isNumeric ? "number" : "text"}
                                                        value={headerTempVal}
                                                        onChange={e => setHeaderTempVal(e.target.value)}
                                                        onKeyDown={e => e.key === 'Enter' && saveEditingHeader()}
                                                        onBlur={saveEditingHeader}
                                                        className={`${isNumeric ? 'w-24' : 'w-32'} px-1 py-0.5 text-xs font-semibold border border-primary outline-none focus:ring-2 focus:ring-primary/20 rounded`}
                                                    />
                                                )
                                            ) : (
                                                <span className={`font-semibold text-slate-900 flex items-center gap-1 ${role !== 'client' ? 'hover:text-primary' : ''} transition-colors`}>
                                                    {isNumeric ? (client[field] > 0 ? formatCurrency(client[field]) : '未設定') : (client[field] || '未設定')}
                                                    {role !== 'client' && <Icon name="Edit3" size={12} className="text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity" />}
                                                </span>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                        <div className="flex flex-wrap items-center justify-end gap-3">
                            <div className="relative">
                                <Icon name="Calendar" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" />
                                <select
                                    value={dateRange}
                                    onChange={(e) => setDateRange(e.target.value)}
                                    className="appearance-none bg-white border border-slate-200 rounded-md shadow-sm pl-9 pr-8 py-2 text-sm font-medium text-slate-700 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary cursor-pointer hover:bg-slate-50 transition-colors"
                                >
                                    <option value="today">本日</option>
                                    <option value="yesterday">昨日</option>
                                    <option value="last_7">過去7日間</option>
                                    <option value="last_30">過去30日間</option>
                                    <option value="this_month">今月</option>
                                    <option value="last_month">先月</option>
                                    <option value="custom">カスタム指定</option>
                                </select>
                                <Icon name="ChevronDown" size={14} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" />
                            </div>
                            {dateRange === 'custom' && (
                                <div className="flex items-center gap-2 animate-in slide-in-from-left-2 duration-300">
                                    <input type="date" value={customStartDate} onChange={e => setCustomStartDate(e.target.value)} className="bg-white border border-slate-200 rounded-md shadow-sm px-3 py-2 text-sm font-medium text-slate-700 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary cursor-pointer hover:bg-slate-50 transition-colors" />
                                    <span className="text-slate-400 font-medium">〜</span>
                                    <input type="date" value={customEndDate} onChange={e => setCustomEndDate(e.target.value)} className="bg-white border border-slate-200 rounded-md shadow-sm px-3 py-2 text-sm font-medium text-slate-700 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary cursor-pointer hover:bg-slate-50 transition-colors" />
                                </div>
                            )}
                            {activeTab === 'dashboard' && role !== 'client' && (
                                <div className="flex items-center gap-2">
                                    <button onClick={() => onFetchMetaAds(client.id)} disabled={isFetchingMeta} className={`bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 rounded-md px-4 py-2 text-sm font-medium shadow-sm transition-colors flex items-center h-[38px] whitespace-nowrap shrink-0 ${isFetchingMeta ? 'opacity-50 cursor-not-allowed' : ''}`}>
